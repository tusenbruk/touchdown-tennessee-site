name: Content Agent

on:
  schedule:
    # Once daily at 6am ET (11:00 UTC) - increase to hourly during game season
    - cron: '0 11 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub UI

jobs:
  run-agent:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r agent/requirements.txt

      - name: Run content agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python agent/content-agent.py

      - name: Commit and push new articles
        run: |
          git config user.name "Ryan Welker"
          git config user.email "ryan@watauga.co"
          git add content/
          # Only commit if there are new articles
          if git diff --staged --quiet; then
            echo "No new articles to commit."
          else
            git commit -m "content: new articles $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
