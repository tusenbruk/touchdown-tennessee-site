<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF8200">
<title>Touchdown Tennessee — Crockett's Catwalk</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; background: #1a1030;
    font-family: 'Impact', 'Arial Black', sans-serif;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }
  #game { display: block; position: absolute; top: 0; left: 0; }

  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    align-items: center;
    padding: 14px 18px; pointer-events: none;
    font-family: 'Impact', 'Arial Black', sans-serif;
    z-index: 10;
  }
  #ballsLeft {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.35);
    padding: 6px 14px 6px 10px;
    border: 3px solid #FFF;
    border-radius: 30px;
    box-shadow: 0 4px 0 #B85A00, inset 0 0 0 2px #FF8200;
  }
  .ball-icon {
    width: 28px; height: 18px;
    background: #8B4513; border-radius: 50%;
    border: 2px solid #FFF;
    box-shadow: 0 2px 0 rgba(0,0,0,0.4);
    position: relative;
    transform: rotate(-20deg);
    flex-shrink: 0;
  }
  .ball-icon::before, .ball-icon::after {
    content: ''; position: absolute;
    background: #FFF; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
  }
  .ball-icon::before { width: 14px; height: 2px; }
  .ball-icon::after { width: 2px; height: 8px; }
  #ballCount {
    font-size: 30px; color: #FFF;
    text-shadow: 2px 2px 0 #B85A00, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    letter-spacing: 1px; min-width: 30px; text-align: center;
  }
  #ballCount.low { color: #FFE066; animation: pulseLow 0.6s infinite alternate; }
  #ballCount.critical { color: #FF3344; animation: pulseLow 0.3s infinite alternate; }
  @keyframes pulseLow { from { transform: scale(1); } to { transform: scale(1.15); } }
  #score {
    font-size: 32px; color: #FFF;
    text-shadow: 3px 3px 0 #FF8200, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    letter-spacing: 2px;
    background: rgba(0,0,0,0.35);
    padding: 4px 16px;
    border: 3px solid #FFF;
    border-radius: 30px;
    box-shadow: 0 4px 0 #B85A00;
  }

  .hof {
    background: rgba(0,0,0,0.6);
    border: 3px solid #FFD700;
    border-radius: 12px;
    padding: 12px 20px;
    margin: 18px auto;
    max-width: 420px;
    box-shadow: 0 0 30px rgba(255,215,0,0.4);
  }
  .hof-title {
    color: #FFD700; font-size: 20px;
    text-align: center; letter-spacing: 3px;
    margin: 0 0 8px;
    text-shadow: 2px 2px 0 #000;
  }
  .hs-table {
    width: 100%;
    color: #FFF;
    font-family: 'Arial Black', 'Arial', sans-serif;
    font-size: 15px;
    border-collapse: collapse;
  }
  .hs-table td { padding: 3px 4px; }
  .hs-table .rank { color: #FFD700; width: 28px; text-align: right; font-weight: bold; }
  .hs-table .name { color: #FFF; letter-spacing: 1px; }
  .hs-table .dots { color: rgba(255,255,255,0.3); }
  .hs-table .score-col { text-align: right; color: #FF8200; font-family: 'Impact'; font-size: 17px; }
  .hs-table tr.you td { color: #FFE066; }
  .hs-table tr.you .score-col { color: #FFE066; }
  .hs-table tr.legend td { color: #FFD700; }
  .hs-table tr.legend .score-col { color: #FFD700; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(circle, rgba(26,16,48,0.85) 0%, rgba(10,5,20,0.95) 100%);
    z-index: 20; padding: 20px;
    text-align: center;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: clamp(36px, 9vw, 84px);
    color: #FF8200; margin: 0 0 8px;
    text-shadow: 4px 4px 0 #000, 6px 6px 0 rgba(255,255,255,0.2);
    letter-spacing: 3px; line-height: 0.95;
  }
  .overlay h2 {
    font-size: clamp(32px, 7vw, 64px);
    color: #FFF; margin: 0 0 12px;
    text-shadow: 4px 4px 0 #FF8200, 6px 6px 0 #000;
    letter-spacing: 2px;
  }
  .overlay .subtitle {
    color: #FFD89E; font-size: clamp(14px, 3vw, 20px);
    margin: 0 0 24px; max-width: 480px;
    line-height: 1.4; letter-spacing: 1px;
    font-family: 'Arial', sans-serif; font-weight: bold;
  }
  .overlay button {
    background: #FF8200; color: #FFF;
    font-family: inherit; font-size: clamp(20px, 5vw, 32px);
    border: 4px solid #FFF; border-radius: 50px;
    padding: 14px 40px; cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 6px 0 #B85A00, 0 8px 20px rgba(0,0,0,0.5);
    transition: all 0.1s; transform: translateY(0);
  }
  .overlay button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #B85A00, 0 4px 10px rgba(0,0,0,0.5);
  }
  .legend {
    margin-top: 24px; display: flex; gap: 20px;
    flex-wrap: wrap; justify-content: center;
    font-family: 'Arial', sans-serif; font-size: 14px;
    color: #FFF;
  }
  .legend .item { display: flex; align-items: center; gap: 8px; }
  .legend .swatch {
    width: 32px; height: 32px; border-radius: 6px;
    border: 2px solid #FFF;
    display: flex; align-items: center; justify-content: center;
    font-weight: bold; font-size: 18px;
  }
  #finalScore {
    color: #FF8200; font-size: clamp(40px, 10vw, 72px);
    text-shadow: 3px 3px 0 #000;
    margin: 12px 0 24px;
  }
</style>
</head>
<body><div id="tdt-back-bar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(26,16,48,0.85);padding:7px 18px;display:flex;align-items:center;justify-content:space-between;font-family:Georgia,serif;pointer-events:auto;">
  <a href="/" style="color:#FF6600;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;text-decoration:none;font-weight:700;">← Touchdown Tennessee</a>
  <span style="color:#8B7355;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;">Crockett&apos;s Catwalk</span>
</div>

<canvas id="game"></canvas>
<div id="ui">
  <div id="ballsLeft">
    <div class="ball-icon"></div>
    <div id="ballCount">15</div>
  </div>
  <div id="score">0</div>
</div>

<div id="title" class="overlay">
  <h1>TOUCHDOWN<br>TENNESSEE</h1>
  <p class="subtitle">CROCKETT'S CATWALK<br>
    15 balls. Knock SEC mascots off the tightrope.<br>
    Don't let 'em reach the uprights.<br>
    <span style="color:#FF8200">DO NOT HIT SMOKEY!</span></p>
  <div class="hof">
    <div class="hof-title">★ HALL OF FAME ★</div>
    <table class="hs-table" id="titleHighscores"></table>
  </div>
  <button id="startBtn">PLAY BALL</button>
</div>

<div id="gameover" class="overlay hidden">
  <h2>GAME OVER</h2>
  <div id="finalScore">0</div>
  <div class="hof">
    <div class="hof-title">★ HALL OF FAME ★</div>
    <table class="hs-table" id="gameoverHighscores"></table>
  </div>
  <button id="restartBtn">PLAY AGAIN</button>
</div>

<script>
(function() {
'use strict';

// ============ CANVAS SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============ GAME STATE ============
const STATE = { TITLE: 0, PLAYING: 1, OVER: 2 };
const MAX_BALLS = 15;
let state = STATE.TITLE;
let score = 0;
let ballsLeft = MAX_BALLS;
let mascots = [];
let footballs = [];
let particles = [];
let popups = [];
let clouds = [];
let stars = [];
let spawnTimer = 1000;
let timeAlive = 0;
let lastTime = performance.now();
let shake = 0;
let aimX = null, aimY = null;
let throwCooldown = 0;
let throwTimer = 0;
let lastThrowAngle = -Math.PI / 4;
let lastFacing = 1;
let cityLights = [];

function ropeY() { return Math.max(140, H * 0.38); }
function playerX() { return W * 0.5; }
function playerY() { return H - 90; }

// Init puffy daytime clouds
for (let i = 0; i < 8; i++) {
  clouds.push({
    x: Math.random() * 2000,
    y: 30 + Math.random() * 140,
    s: 0.7 + Math.random() * 1.0,
    v: 4 + Math.random() * 10
  });
}
// Sun rays / sparkle phases (kept for city window glint)
for (let i = 0; i < 80; i++) {
  cityLights.push({
    seed: Math.random() * 100,
    phase: Math.random() * Math.PI * 2
  });
}

// ============ HIGH SCORES ============
const HS_KEY = 'tt_highscores_v1';
const LEGEND_NAME = 'P. MANNING';
const LEGEND_SCORE = 1000000;
const DEFAULT_HS = [
  { name: LEGEND_NAME, score: LEGEND_SCORE, legend: true },
  { name: 'T. MARTIN',  score: 12500 },
  { name: 'P. SUMMITT', score: 9800 },
  { name: 'R. WHITE',   score: 7400 },
  { name: 'H. SHULER',  score: 5200 }
];

function loadHighScores() {
  let list = null;
  try {
    const raw = localStorage.getItem(HS_KEY);
    if (raw) list = JSON.parse(raw);
  } catch (e) {}
  if (!Array.isArray(list) || list.length === 0) {
    list = DEFAULT_HS.map(e => ({ ...e }));
  }
  // P. Manning is always atop, untouchable
  list = list.filter(e => !(e.name === LEGEND_NAME && e.score >= LEGEND_SCORE));
  list.unshift({ name: LEGEND_NAME, score: LEGEND_SCORE, legend: true });
  list.sort((a, b) => b.score - a.score);
  return list.slice(0, 5);
}

function saveHighScore(name, sc) {
  const list = loadHighScores().filter(e => !e.legend);
  list.push({ name, score: sc });
  list.sort((a, b) => b.score - a.score);
  const top = list.slice(0, 4); // 4 mortal slots (Manning is +1)
  try { localStorage.setItem(HS_KEY, JSON.stringify(top)); } catch (e) {}
  return loadHighScores();
}

function qualifiesForLeaderboard(sc) {
  if (sc <= 0) return false;
  const list = loadHighScores();
  if (list.length < 5) return true;
  return sc > list[list.length - 1].score;
}

function renderHighScores(tableEl, highlightScore) {
  const list = loadHighScores();
  let html = '';
  let highlighted = false;
  list.forEach((entry, i) => {
    let cls = '';
    if (entry.legend) cls = 'legend';
    else if (!highlighted && highlightScore !== undefined && entry.score === highlightScore) {
      cls = 'you';
      highlighted = true;
    }
    html += `<tr class="${cls}">` +
      `<td class="rank">${i + 1}.</td>` +
      `<td class="name">${escapeHtml(entry.name)}</td>` +
      `<td class="dots">.....</td>` +
      `<td class="score-col">${entry.score.toLocaleString()}</td>` +
      `</tr>`;
  });
  tableEl.innerHTML = html;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}

// ============ AUDIO ============
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) {}
  }
}
function beep(freq, dur, type='square', vol=0.08, slide=0) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur + 0.05);
  } catch(e) {}
}

// ============ MASCOT TYPES ============
// Slow + bulky = high value, fast + small = low value
const ENEMIES = [
  { id:'tide',  label:'TIDE',   body:'#8E939A', accent:'#9E1B32', alt:'#FFFFFF', points:250, speedMult:0.6, weight:1 },
  { id:'dawg',  label:'DAWGS',  body:'#7B4B23', accent:'#BA0C2F', alt:'#000000', points:200, speedMult:0.85, weight:1.2 },
  { id:'gator', label:'GATOR',  body:'#2D5016', accent:'#FA4616', alt:'#0021A5', points:175, speedMult:0.95, weight:1.4 },
  { id:'tiger', label:'TIGER',  body:'#E2A92F', accent:'#461D7C', alt:'#000000', points:150, speedMult:1.1, weight:1.2 },
  { id:'horn',  label:'HORNS',  body:'#BF5700', accent:'#FFFFFF', alt:'#000000', points:125, speedMult:0.9, weight:1 },
  { id:'cock',  label:'COCKS',  body:'#7B0011', accent:'#000000', alt:'#FFD700', points:100, speedMult:1.15, weight:1.3 },
  { id:'hog',   label:'HOGS',   body:'#D49090', accent:'#9D2235', alt:'#FFFFFF', points:75,  speedMult:1.3, weight:1.4 },
  { id:'cat',   label:'CATS',   body:'#1B3D8F', accent:'#FFFFFF', alt:'#A2AAAD', points:50,  speedMult:1.55, weight:1.5 }
];
function pickEnemy() {
  const total = ENEMIES.reduce((s, e) => s + e.weight, 0);
  let r = Math.random() * total;
  for (const e of ENEMIES) { r -= e.weight; if (r <= 0) return e; }
  return ENEMIES[0];
}

// ============ SPAWN ============
function spawnMascot() {
  const dir = Math.random() < 0.5 ? 1 : -1;
  const x = dir === 1 ? -50 : W + 50;
  const difficulty = Math.min(1, timeAlive / 75000);
  const baseSpeed = 45 + difficulty * 70;

  // Smokey appears more often as it gets harder (forces precision)
  const smokeyChance = 0.18 + difficulty * 0.17;
  const alreadySmokeys = mascots.filter(m => m.smokey && !m.hit).length;
  const isSmokey = alreadySmokeys < 1 && Math.random() < smokeyChance;

  const type = isSmokey ? null : pickEnemy();
  const speedMult = isSmokey ? 0.85 : type.speedMult;
  const speed = (baseSpeed + Math.random() * 25) * speedMult;

  mascots.push({
    x: x, y: ropeY(), dir: dir, vx: dir * speed,
    smokey: isSmokey,
    type: type,
    startedLeft: dir === 1,
    crossed: false,
    crossedTimer: 0,
    bob: 0, walkPhase: Math.random() * Math.PI * 2,
    hit: false, fallVy: 0, fallVx: 0, rot: 0,
    blink: 0
  });
}

// ============ FOOTBALL THROW ============
function throwBall(tx, ty) {
  if (throwCooldown > 0) return;
  if (ballsLeft <= 0) return;
  throwCooldown = 0.15;
  ballsLeft--;
  updateBallsUI();
  const px = playerX();
  const py = playerY() - 50;
  const dx = tx - px;
  const dy = ty - py;
  // Fixed-ish flight: longer for farther targets
  const t = 0.55 + Math.min(0.5, Math.abs(dx) / W * 0.6);
  const g = 1400;
  const vx = dx / t;
  const vy = (dy - 0.5 * g * t * t) / t;
  footballs.push({
    x: px, y: py, vx, vy, rot: 0,
    rotSpeed: 18 * Math.sign(vx || 1),
    trail: []
  });
  lastFacing = (tx < playerX()) ? -1 : 1;
  lastThrowAngle = Math.atan2(ty - py, Math.abs(tx - px));
  throwTimer = 0.32;
  beep(180, 0.08, 'square', 0.07, 200);
}

// ============ COLLISION & SCORE ============
function hitMascot(m, fb) {
  m.hit = true;
  m.fallVx = (m.vx * 0.3) + (fb.vx * 0.15) + (Math.random() - 0.5) * 80;
  m.fallVy = -180 - Math.random() * 80;
  m.rotDir = (Math.random() < 0.5 ? -1 : 1);
  fb.dead = true;
  shake = Math.max(shake, 6);

  if (m.smokey) {
    score = Math.max(0, score - 500);
    spawnExplosion(m.x, m.y - 10, '#FF8200', 35);
    spawnExplosion(m.x, m.y - 10, '#FFFFFF', 20);
    popups.push({
      x: m.x, y: m.y - 30, text: 'NOT SMOKEY!',
      color: '#FF3344', life: 1.6, vy: -50, size: 22
    });
    popups.push({
      x: m.x, y: m.y - 55, text: '-500',
      color: '#FFF', life: 1.6, vy: -50, size: 18
    });
    beep(140, 0.5, 'sawtooth', 0.14, -100);
    beep(90, 0.6, 'sawtooth', 0.12, -50);
  } else {
    const pts = m.type.points;
    score += pts;
    spawnExplosion(m.x, m.y - 10, m.type.accent, 18);
    spawnExplosion(m.x, m.y - 10, '#FFD700', 12);
    // Color the popup by value tier
    const popColor = pts >= 200 ? '#FFD700' : pts >= 125 ? '#FFFFFF' : '#FFB366';
    const popSize = pts >= 200 ? 28 : pts >= 125 ? 24 : 20;
    popups.push({
      x: m.x, y: m.y - 30, text: '+' + pts,
      color: popColor, life: 1.1, vy: -60, size: popSize
    });
    // Pitch scales with value
    const baseHz = 440 + Math.min(pts, 250) * 1.8;
    beep(baseHz, 0.08, 'square', 0.1);
    beep(baseHz * 1.5, 0.12, 'square', 0.08);
  }
}

function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 80 + Math.random() * 260;
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 80,
      color: color,
      size: 2 + Math.random() * 5,
      life: 0.4 + Math.random() * 0.6,
      maxLife: 0.4 + Math.random() * 0.6
    });
  }
}

// ============ UPDATE ============
function update(dt) {
  if (shake > 0) shake = Math.max(0, shake - dt * 30);
  if (throwCooldown > 0) throwCooldown -= dt;
  if (throwTimer > 0) throwTimer -= dt;

  // Animated background elements
  for (const c of clouds) {
    c.x += c.v * dt;
    if (c.x > W + 100) c.x = -100;
  }
  for (const s of stars) s.twinkle += dt * 3;

  if (state !== STATE.PLAYING) return;
  timeAlive += dt * 1000;

  // Spawn
  spawnTimer -= dt * 1000;
  if (spawnTimer <= 0) {
    spawnMascot();
    const difficulty = Math.min(1, timeAlive / 75000);
    spawnTimer = Math.max(350, 1500 - difficulty * 1100) + Math.random() * 500;
  }

  // Mascots
  for (const m of mascots) {
    if (m.hit) {
      m.fallVy += 1600 * dt;
      m.x += m.fallVx * dt;
      m.y += m.fallVy * dt;
      m.rot += (m.rotDir || 1) * 9 * dt;
    } else {
      m.x += m.vx * dt;
      m.walkPhase += dt * 9;
      m.bob = Math.sin(m.walkPhase) * 2.5;
      m.blink -= dt;
      if (m.blink < -0.15) m.blink = 2 + Math.random() * 3;
      if (m.crossed) m.crossedTimer += dt;
      // Check if reached goalposts
      if (!m.crossed) {
        const reached = (m.startedLeft && m.x >= W * 0.5) ||
                        (!m.startedLeft && m.x <= W * 0.5);
        if (reached) {
          m.crossed = true;
          m.crossedTimer = 0;
          if (!m.smokey) {
            const lost = m.type.points;
            score = Math.max(0, score - lost);
            m.vx *= 1.6; // taunting sprint
            shake = Math.max(shake, 4);
            spawnExplosion(W * 0.5, ropeY() - 30, '#FF3344', 14);
            popups.push({
              x: W * 0.5, y: ropeY() - 40, text: 'TOUCHDOWN!',
              color: '#FF3344', life: 1.4, vy: -45, size: 22
            });
            popups.push({
              x: W * 0.5, y: ropeY() - 15, text: '-' + lost,
              color: '#FFF', life: 1.4, vy: -45, size: 18
            });
            beep(220, 0.25, 'sawtooth', 0.12, -120);
            beep(140, 0.35, 'sawtooth', 0.1, -60);
          } else {
            // Smokey scored — friendly cheer
            popups.push({
              x: W * 0.5, y: ropeY() - 30, text: 'GO VOLS!',
              color: '#FF8200', life: 1.4, vy: -45, size: 22
            });
            beep(660, 0.1, 'square', 0.1);
            beep(880, 0.1, 'square', 0.08);
          }
        }
      }
    }
  }
  mascots = mascots.filter(m => {
    if (m.hit) return m.y < H + 150;
    return m.x > -80 && m.x < W + 80;
  });

  // End game when all balls thrown and none in flight
  if (state === STATE.PLAYING && ballsLeft <= 0 && footballs.length === 0) {
    endGame();
  }

  // Footballs
  for (const f of footballs) {
    f.trail.push({ x: f.x, y: f.y });
    if (f.trail.length > 8) f.trail.shift();
    f.vy += 1400 * dt;
    f.x += f.vx * dt;
    f.y += f.vy * dt;
    f.rot += f.rotSpeed * dt;
  }
  footballs = footballs.filter(f => !f.dead && f.y < H + 50 && f.x > -80 && f.x < W + 80);

  // Collisions
  for (const f of footballs) {
    if (f.dead) continue;
    for (const m of mascots) {
      if (m.hit || m.crossed) continue;
      const dx = f.x - m.x;
      const dy = f.y - (m.y - 22);
      if (dx * dx + dy * dy < 38 * 38) {
        hitMascot(m, f);
        break;
      }
    }
  }
  footballs = footballs.filter(f => !f.dead);

  // Particles
  for (const p of particles) {
    p.vy += 700 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  // Popups
  for (const p of popups) {
    p.y += p.vy * dt;
    p.vy += 60 * dt;
    p.life -= dt;
  }
  popups = popups.filter(p => p.life > 0);

  // UI
  document.getElementById('score').textContent = score.toLocaleString();
}

// ============ DRAWING ============
function draw() {
  // Shake
  const sx = (Math.random() - 0.5) * shake;
  const sy = (Math.random() - 0.5) * shake;
  ctx.save();
  ctx.translate(sx, sy);

  drawSky();
  drawSmokies();
  drawClouds();
  drawKnoxville();
  drawGoalPosts();
  drawTightrope();

  // Sort mascots so falling ones draw on top
  const sorted = [...mascots].sort((a, b) => (a.hit?1:0) - (b.hit?1:0));
  for (const m of sorted) drawMascot(m);

  for (const f of footballs) drawFootball(f);
  for (const p of particles) drawParticle(p);

  drawPlayer();
  drawAimGuide();

  for (const p of popups) drawPopup(p);

  ctx.restore();
}

function drawSky() {
  // Bright daytime sky
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#3a8de8');
  g.addColorStop(0.4, '#6ab8f5');
  g.addColorStop(0.75, '#a8dffb');
  g.addColorStop(1, '#dff2fb');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);

  // Bright midday sun (upper-right)
  const sunY = H * 0.18;
  const sunX = W * 0.82;
  const sunRays = ctx.createRadialGradient(sunX, sunY, 12, sunX, sunY, 180);
  sunRays.addColorStop(0, 'rgba(255,250,180,0.85)');
  sunRays.addColorStop(0.3, 'rgba(255,225,120,0.45)');
  sunRays.addColorStop(1, 'rgba(255,200,80,0)');
  ctx.fillStyle = sunRays;
  ctx.fillRect(sunX - 200, sunY - 200, 400, 400);
  // Sun disc
  ctx.fillStyle = '#FFF4B0';
  ctx.beginPath();
  ctx.arc(sunX, sunY, 32, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.arc(sunX - 5, sunY - 5, 14, 0, Math.PI * 2);
  ctx.fill();
}

function drawSmokies() {
  // Distant Smoky Mountains — daytime blue-haze ridges
  // Far layer (hazy blue)
  ctx.fillStyle = 'rgba(125,150,180,0.7)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.62);
  const peaks = 10;
  for (let i = 0; i <= peaks; i++) {
    const x = (i / peaks) * W;
    const y = H * 0.62 - (40 + Math.sin(i * 1.3) * 35 + (i % 2 ? 25 : 0));
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H * 0.7);
  ctx.lineTo(0, H * 0.7);
  ctx.fill();

  // Near Smokies layer (forest greens with haze)
  ctx.fillStyle = 'rgba(80,110,95,0.9)';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.68);
  for (let i = 0; i <= 8; i++) {
    const x = (i / 8) * W;
    const y = H * 0.68 - (30 + Math.cos(i * 2.1) * 25 + (i % 3 === 0 ? 20 : 0));
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H * 0.75);
  ctx.lineTo(0, H * 0.75);
  ctx.fill();

  // Smoky mountain mist (the "smoky" haze the range is famous for)
  ctx.fillStyle = 'rgba(255,255,255,0.22)';
  ctx.fillRect(0, H * 0.6, W, H * 0.08);
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  ctx.fillRect(0, H * 0.66, W, H * 0.06);
}

function drawKnoxville() {
  const groundY = H * 0.86;       // top of "river"
  const riverBottom = H * 0.92;
  const baseY = H * 0.78;         // base of buildings (city sits on bluffs above river)

  // === RIVER (Tennessee River) — daytime blue ===
  const riverGrad = ctx.createLinearGradient(0, groundY, 0, riverBottom);
  riverGrad.addColorStop(0, '#5896c8');
  riverGrad.addColorStop(0.5, '#3c75aa');
  riverGrad.addColorStop(1, '#4988b5');
  ctx.fillStyle = riverGrad;
  ctx.fillRect(0, groundY, W, riverBottom - groundY);
  // River shimmer / waves (sunlight glint)
  ctx.strokeStyle = 'rgba(255,255,255,0.5)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 5; i++) {
    const yy = groundY + 6 + i * 8;
    ctx.beginPath();
    for (let xx = 0; xx < W; xx += 8) {
      const off = Math.sin(xx * 0.05 + performance.now() / 1200 + i) * 2;
      if (xx === 0) ctx.moveTo(xx, yy + off);
      else ctx.lineTo(xx, yy + off);
    }
    ctx.stroke();
  }

  // === DOWNTOWN SKYLINE (silhouette layers) ===
  // Build a row of generic buildings as backdrop
  ctx.save();
  // Daytime building palette — sun-lit fronts with deeper shade on right side
  const buildings = [
    { x: 0.05, w: 0.06, h: 80,  body: '#9a99a8', shade: '#6e6d7a', glass: '#bcdaf2' },
    { x: 0.11, w: 0.05, h: 110, body: '#b8a98c', shade: '#8a7e66', glass: '#d6e8ea' },
    { x: 0.16, w: 0.07, h: 95,  body: '#8b95a2', shade: '#5f6976', glass: '#cee2ee' },
    { x: 0.23, w: 0.04, h: 130, body: '#cdc1a8', shade: '#9a8e75', glass: '#e2eef0' },
    { x: 0.27, w: 0.06, h: 75,  body: '#a8a8b8', shade: '#787888', glass: '#cce2ee' },
    // Gap for Sunsphere (around 0.34)
    { x: 0.42, w: 0.05, h: 100, body: '#b89c80', shade: '#8a6f55', glass: '#e0eaf0' },
    { x: 0.47, w: 0.06, h: 165, body: '#7c8c9e', shade: '#52606e', glass: '#bcd8ee' }, // Tennessee Tower-ish
    { x: 0.53, w: 0.04, h: 120, body: '#aab4c0', shade: '#7a8492', glass: '#cee2ee' },
    { x: 0.57, w: 0.07, h: 95,  body: '#b8a98c', shade: '#8a7e66', glass: '#d6e8ea' },
    { x: 0.64, w: 0.05, h: 140, body: '#8b95a2', shade: '#5f6976', glass: '#cee2ee' },
    { x: 0.69, w: 0.05, h: 85,  body: '#a8a098', shade: '#787068', glass: '#cce2ee' },
    // Gap for Neyland Stadium (around 0.78)
    { x: 0.88, w: 0.06, h: 90,  body: '#9a99a8', shade: '#6e6d7a', glass: '#cce2ee' },
    { x: 0.94, w: 0.05, h: 110, body: '#b89c80', shade: '#8a6f55', glass: '#e0eaf0' }
  ];
  for (let i = 0; i < buildings.length; i++) {
    const b = buildings[i];
    const bx = W * b.x;
    const bw = W * b.w;
    // Body
    ctx.fillStyle = b.body;
    ctx.fillRect(bx, baseY - b.h, bw, b.h + 10);
    // Right-side shading (sun comes from upper right, so left side of building catches sun — but our sun is at 0.82, so right side is sunward, left side shaded. Reverse for realism.)
    ctx.fillStyle = b.shade;
    ctx.fillRect(bx, baseY - b.h, Math.max(3, bw * 0.18), b.h + 10);
    // Roof line
    ctx.fillStyle = b.shade;
    ctx.fillRect(bx, baseY - b.h, bw, 3);
    // Outline
    ctx.strokeStyle = 'rgba(40,30,60,0.7)';
    ctx.lineWidth = 1;
    ctx.strokeRect(bx + 0.5, baseY - b.h + 0.5, bw - 1, b.h + 9);
    // Windows — grid (most blue-glass, some with sun glint)
    const cols = Math.max(2, Math.floor(bw / 8));
    const rows = Math.max(3, Math.floor(b.h / 10));
    for (let cx = 0; cx < cols; cx++) {
      for (let cy = 0; cy < rows; cy++) {
        const lightIdx = (i * 31 + cx * 7 + cy * 3) % cityLights.length;
        const light = cityLights[lightIdx];
        const glintT = (Math.sin(performance.now() / 1800 + light.phase) + 1) * 0.5;
        const isGlint = (light.seed % 1) > 0.85;
        ctx.fillStyle = isGlint
          ? `rgba(255,250,200,${0.6 + glintT * 0.4})`
          : b.glass;
        ctx.fillRect(bx + 3 + cx * 8, baseY - b.h + 6 + cy * 10, 2, 3);
      }
    }
    // Rooftop antenna on tallest
    if (b.h >= 140) {
      ctx.fillStyle = '#3a3a4a';
      ctx.fillRect(bx + bw/2 - 1, baseY - b.h - 14, 2, 14);
      // Blinking red light (always-on FAA light)
      const blink = (Math.sin(performance.now() / 400) + 1) * 0.5;
      ctx.fillStyle = `rgba(220,40,40,${0.5 + blink * 0.5})`;
      ctx.fillRect(bx + bw/2 - 2, baseY - b.h - 16, 4, 4);
    }
  }
  ctx.restore();

  // === SUNSPHERE (gold ball on lattice tower) ===
  const sunsphereX = W * 0.36;
  const sunsphereY = baseY - 30;
  drawSunsphere(sunsphereX, sunsphereY);

  // === NEYLAND STADIUM ===
  const stadiumX = W * 0.80;
  drawNeyland(stadiumX, baseY);

  // === HENLEY STREET BRIDGE (over the river) ===
  drawHenleyBridge(0, W, groundY);

  // === GROUND/EMBANKMENT (in front of river, where player stands) ===
  const grassGrad = ctx.createLinearGradient(0, riverBottom, 0, H);
  grassGrad.addColorStop(0, '#6ea53c');
  grassGrad.addColorStop(0.5, '#558a2a');
  grassGrad.addColorStop(1, '#3d6b1b');
  ctx.fillStyle = grassGrad;
  ctx.fillRect(0, riverBottom, W, H - riverBottom);
  // Grass blades
  ctx.strokeStyle = '#7fbf4a';
  ctx.lineWidth = 1;
  for (let i = 0; i < 60; i++) {
    const gx = (i * 47) % W;
    const gy = riverBottom + 4 + (i * 13) % 30;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx + 1, gy - 4);
    ctx.stroke();
  }
  ctx.strokeStyle = '#3d6b1b';
  for (let i = 0; i < 30; i++) {
    const gx = (i * 71) % W;
    const gy = riverBottom + 14 + (i * 19) % 40;
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx + 1, gy - 3);
    ctx.stroke();
  }
}

function drawSunsphere(x, baseTopY) {
  // The lattice tower (steel)
  const towerH = 95;
  const towerTopY = baseTopY - towerH;
  // Tower legs
  ctx.strokeStyle = '#7a6a55';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(x - 14, baseTopY);
  ctx.lineTo(x - 4, towerTopY);
  ctx.lineTo(x + 4, towerTopY);
  ctx.lineTo(x + 14, baseTopY);
  ctx.stroke();
  // Center column
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x, baseTopY);
  ctx.lineTo(x, towerTopY);
  ctx.stroke();
  // Cross-bracing
  ctx.lineWidth = 1.2;
  ctx.strokeStyle = '#6a5a48';
  for (let i = 0; i < 6; i++) {
    const t = i / 6;
    const y1 = baseTopY - t * towerH;
    const y2 = baseTopY - (t + 1/6) * towerH;
    const wL = 14 - t * 10;
    const wR = 14 - (t + 1/6) * 10;
    ctx.beginPath();
    ctx.moveTo(x - wL, y1); ctx.lineTo(x + wR, y2);
    ctx.moveTo(x + wL, y1); ctx.lineTo(x - wR, y2);
    ctx.stroke();
  }

  // The golden sphere (the iconic Sunsphere)
  const sphereR = 18;
  const sphereY = towerTopY - sphereR + 2;
  // Glow halo
  const glow = ctx.createRadialGradient(x, sphereY, 2, x, sphereY, sphereR * 2.5);
  glow.addColorStop(0, 'rgba(255,210,100,0.5)');
  glow.addColorStop(1, 'rgba(255,200,80,0)');
  ctx.fillStyle = glow;
  ctx.beginPath();
  ctx.arc(x, sphereY, sphereR * 2.5, 0, Math.PI * 2);
  ctx.fill();
  // Sphere body (gold)
  const sphereGrad = ctx.createRadialGradient(x - 4, sphereY - 4, 2, x, sphereY, sphereR);
  sphereGrad.addColorStop(0, '#FFE680');
  sphereGrad.addColorStop(0.5, '#FFC83D');
  sphereGrad.addColorStop(1, '#B8860B');
  ctx.fillStyle = sphereGrad;
  ctx.beginPath();
  ctx.arc(x, sphereY, sphereR, 0, Math.PI * 2);
  ctx.fill();
  // Hex facet pattern
  ctx.strokeStyle = 'rgba(120,80,20,0.5)';
  ctx.lineWidth = 0.8;
  for (let r = 1; r <= 3; r++) {
    ctx.beginPath();
    ctx.arc(x, sphereY, (sphereR * r) / 3, 0, Math.PI * 2);
    ctx.stroke();
  }
  for (let a = 0; a < 6; a++) {
    const ang = a * Math.PI / 3;
    ctx.beginPath();
    ctx.moveTo(x, sphereY);
    ctx.lineTo(x + Math.cos(ang) * sphereR, sphereY + Math.sin(ang) * sphereR);
    ctx.stroke();
  }
  // Bright spot
  ctx.fillStyle = 'rgba(255,255,220,0.7)';
  ctx.beginPath();
  ctx.arc(x - 6, sphereY - 6, 4, 0, Math.PI * 2);
  ctx.fill();
}

function drawNeyland(cx, baseY) {
  // Stadium oval bowl — daytime concrete with orange/white trim
  const sw = W * 0.16;
  const sh = 50;
  ctx.fillStyle = '#c4bca8';
  ctx.beginPath();
  ctx.ellipse(cx, baseY - sh * 0.4, sw / 2, sh / 2, 0, 0, Math.PI * 2);
  ctx.fill();
  // Stadium tiers (curved bands)
  ctx.fillStyle = '#a89e8a';
  ctx.beginPath();
  ctx.ellipse(cx, baseY - sh * 0.5, sw / 2 * 0.9, sh / 2 * 0.85, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // Inner shadow / bowl interior
  ctx.fillStyle = '#7a7060';
  ctx.beginPath();
  ctx.ellipse(cx, baseY - sh * 0.55, sw / 2 * 0.7, sh / 2 * 0.55, 0, Math.PI, Math.PI * 2);
  ctx.fill();
  // Checkerboard end zone hint (orange/white blocks at base front)
  ctx.fillStyle = '#FF8200';
  ctx.fillRect(cx - sw/2 + 6, baseY - 4, sw - 12, 4);
  ctx.fillStyle = '#FFFFFF';
  for (let i = 0; i < 8; i++) {
    if (i % 2 === 0) {
      ctx.fillRect(cx - sw/2 + 6 + i * (sw - 12) / 8, baseY - 4, (sw - 12) / 8, 4);
    }
  }
  // Light towers (4) — daytime, lights off
  ctx.strokeStyle = '#888';
  ctx.lineWidth = 1.5;
  const lightX = [cx - sw/2 + 8, cx - sw/4, cx + sw/4, cx + sw/2 - 8];
  for (const lx of lightX) {
    ctx.beginPath();
    ctx.moveTo(lx, baseY - 4);
    ctx.lineTo(lx, baseY - sh - 14);
    ctx.stroke();
    // Light bank (off but glints in sun)
    ctx.fillStyle = '#d8d4c8';
    ctx.fillRect(lx - 4, baseY - sh - 18, 8, 5);
    ctx.fillStyle = '#FFFFFF';
    ctx.fillRect(lx - 3, baseY - sh - 17, 3, 1);
  }
  // "NEYLAND" tiny label in orange
  ctx.fillStyle = '#FF8200';
  ctx.font = 'bold 8px Impact';
  ctx.textAlign = 'center';
  ctx.fillText('NEYLAND', cx, baseY - sh * 0.25);
}

function drawHenleyBridge(x0, x1, riverTopY) {
  // Henley Street Bridge - daytime concrete arches
  const span = x1 - x0;
  const archCount = 5;
  const archWidth = span / archCount;
  const archH = 28;
  const deckY = riverTopY - archH - 6;

  // Bridge deck (concrete)
  ctx.fillStyle = '#b8b0a0';
  ctx.fillRect(x0, deckY, span, 7);
  // Deck shadow underside
  ctx.fillStyle = '#8a8270';
  ctx.fillRect(x0, deckY + 5, span, 2);
  // Railings (dotted balusters)
  ctx.fillStyle = '#9a9080';
  for (let i = 0; i < span; i += 12) {
    ctx.fillRect(x0 + i, deckY - 3, 2, 3);
  }
  // Railing top
  ctx.fillStyle = '#8a8270';
  ctx.fillRect(x0, deckY - 4, span, 1);

  // Arches (concrete)
  ctx.fillStyle = '#a09888';
  for (let i = 0; i < archCount; i++) {
    const ax = x0 + i * archWidth + archWidth / 2;
    // Pylon
    ctx.fillStyle = '#a09888';
    ctx.fillRect(ax - archWidth/2 - 1, deckY, 3, riverTopY - deckY);
    // Arch span
    ctx.beginPath();
    ctx.moveTo(ax - archWidth/2 + 2, riverTopY);
    ctx.quadraticCurveTo(ax, deckY + 8, ax + archWidth/2 - 2, riverTopY);
    ctx.lineTo(ax + archWidth/2 - 2, deckY + 7);
    ctx.lineTo(ax - archWidth/2 + 2, deckY + 7);
    ctx.closePath();
    ctx.fill();
    // Arch underside shade
    ctx.fillStyle = '#7a7262';
    ctx.beginPath();
    ctx.moveTo(ax - archWidth/2 + 4, riverTopY);
    ctx.quadraticCurveTo(ax, deckY + 12, ax + archWidth/2 - 4, riverTopY);
    ctx.lineTo(ax + archWidth/2 - 4, deckY + 7);
    ctx.lineTo(ax - archWidth/2 + 4, deckY + 7);
    ctx.closePath();
    ctx.fill();
    ctx.fillStyle = '#a09888';
  }
  // Reflection in water (lighter, daytime)
  ctx.fillStyle = 'rgba(120,110,100,0.4)';
  for (let i = 0; i < archCount; i++) {
    const ax = x0 + i * archWidth + archWidth / 2;
    ctx.beginPath();
    ctx.moveTo(ax - archWidth/2 + 2, riverTopY);
    ctx.quadraticCurveTo(ax, riverTopY + 8, ax + archWidth/2 - 2, riverTopY);
    ctx.lineTo(ax - archWidth/2 + 2, riverTopY);
    ctx.fill();
  }
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.85)';
  for (const c of clouds) {
    const x = c.x % (W + 200) - 100;
    const s = c.s;
    ctx.beginPath();
    ctx.ellipse(x, c.y, 30 * s, 14 * s, 0, 0, Math.PI * 2);
    ctx.ellipse(x + 20 * s, c.y - 6 * s, 22 * s, 16 * s, 0, 0, Math.PI * 2);
    ctx.ellipse(x - 18 * s, c.y - 4 * s, 18 * s, 12 * s, 0, 0, Math.PI * 2);
    ctx.fill();
  }
}

function drawGoalPosts() {
  const cx = W * 0.5;
  const y = ropeY();
  const gpWidth = Math.min(90, W * 0.13);  // distance between uprights
  const upHeight = 110;                     // upright height above rope
  const stubHeight = 24;                    // below-rope stub length
  const postW = 7;

  // Drop shadow under goal posts
  ctx.fillStyle = 'rgba(0,0,0,0.18)';
  ctx.beginPath();
  ctx.ellipse(cx, y + 30, gpWidth/2 + 10, 5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Helper: 3D post with shading
  function postBar(x, y, w, h) {
    // Outline
    ctx.fillStyle = '#000';
    ctx.fillRect(x - 1, y - 1, w + 2, h + 2);
    // Body
    ctx.fillStyle = '#FFD700';
    ctx.fillRect(x, y, w, h);
    // Shadow (right side)
    ctx.fillStyle = '#C9A300';
    ctx.fillRect(x + w - Math.max(2, w * 0.3), y, Math.max(2, w * 0.3), h);
    // Highlight (left side)
    ctx.fillStyle = '#FFF1A8';
    ctx.fillRect(x, y, Math.max(2, w * 0.25), h);
  }

  // Center stub coming down from crossbar (vertical "post")
  postBar(cx - postW/2, y - 6, postW, stubHeight + 6);
  // Base plate / mounting cap
  ctx.fillStyle = '#000';
  ctx.fillRect(cx - postW - 2, y + stubHeight - 2, postW * 2 + 4, 4);
  ctx.fillStyle = '#C9A300';
  ctx.fillRect(cx - postW - 1, y + stubHeight - 1, postW * 2 + 2, 2);

  // Crossbar (horizontal at rope level)
  postBar(cx - gpWidth/2, y - 10, gpWidth, 7);

  // Left upright
  postBar(cx - gpWidth/2, y - 10 - upHeight, postW, upHeight + 4);
  // Right upright
  postBar(cx + gpWidth/2 - postW, y - 10 - upHeight, postW, upHeight + 4);

  // Upright tops — little ball finials with red ribbon "flags"
  // Left top
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx - gpWidth/2 + postW/2, y - 10 - upHeight - 4, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(cx - gpWidth/2 + postW/2, y - 10 - upHeight - 4, 5, 0, Math.PI*2); ctx.fill();
  // Right top
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(cx + gpWidth/2 - postW/2, y - 10 - upHeight - 4, 6, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.beginPath(); ctx.arc(cx + gpWidth/2 - postW/2, y - 10 - upHeight - 4, 5, 0, Math.PI*2); ctx.fill();

  // Wind ribbons flapping from each upright top
  const t = performance.now() / 200;
  ctx.fillStyle = '#FF8200';
  // Left ribbon
  ctx.save();
  ctx.translate(cx - gpWidth/2 + postW/2, y - 10 - upHeight - 8);
  ctx.beginPath();
  for (let i = 0; i <= 6; i++) {
    const xx = i * 4;
    const yy = Math.sin(t + i * 0.6) * 2;
    if (i === 0) ctx.moveTo(xx, yy - 2);
    else ctx.lineTo(xx, yy - 2);
  }
  for (let i = 6; i >= 0; i--) {
    const xx = i * 4;
    const yy = Math.sin(t + i * 0.6) * 2;
    ctx.lineTo(xx, yy + 2);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
  // Right ribbon (mirrored)
  ctx.save();
  ctx.translate(cx + gpWidth/2 - postW/2, y - 10 - upHeight - 8);
  ctx.scale(-1, 1);
  ctx.beginPath();
  for (let i = 0; i <= 6; i++) {
    const xx = i * 4;
    const yy = Math.sin(t + 1 + i * 0.6) * 2;
    if (i === 0) ctx.moveTo(xx, yy - 2);
    else ctx.lineTo(xx, yy - 2);
  }
  for (let i = 6; i >= 0; i--) {
    const xx = i * 4;
    const yy = Math.sin(t + 1 + i * 0.6) * 2;
    ctx.lineTo(xx, yy + 2);
  }
  ctx.closePath();
  ctx.fill();
  ctx.restore();
}

function drawTightrope() {
  const y = ropeY();
  // Posts
  drawPost(40, y);
  drawPost(W - 40, y);
  // Rope with slight sag
  ctx.strokeStyle = '#3a2410';
  ctx.lineWidth = 6;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(40, y);
  ctx.quadraticCurveTo(W * 0.5, y + 8, W - 40, y);
  ctx.stroke();
  // Highlight
  ctx.strokeStyle = '#8b5a2b';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(40, y - 2);
  ctx.quadraticCurveTo(W * 0.5, y + 6, W - 40, y - 2);
  ctx.stroke();
}

function drawPost(x, y) {
  ctx.fillStyle = '#4a2c10';
  ctx.fillRect(x - 8, y, 16, 80);
  ctx.fillStyle = '#6b3f18';
  ctx.fillRect(x - 8, y, 4, 80);
  // Base
  ctx.fillStyle = '#2a1808';
  ctx.fillRect(x - 22, y + 70, 44, 10);
}

// ============ PLAYER (Davy Crockett QB — Double Dragon style) ============
// Color palette
const PC = {
  hatDark:   '#2a1408',
  hatMid:    '#4a2810',
  hatLight:  '#6b3a18',
  stripe:    '#1a0a04',
  skin:      '#f4c896',
  skinShade: '#c69569',
  skinHi:    '#ffe0b8',
  hair:      '#3a2010',
  beard:     '#4a2818',
  jersey:    '#FF8200',
  jerseyHi:  '#ffb04a',
  jerseyShade:'#b85a00',
  white:     '#ffffff',
  pants:     '#5b3216',
  pantsHi:   '#7a4520',
  pantsShade:'#3a200d',
  boot:      '#1a0a04',
  bootHi:    '#3a1a0a',
  belt:      '#2a1408',
  buckle:    '#FFD700',
  outline:   '#000000',
  ball:      '#6b3410',
  ballHi:    '#8b4818',
  fringe:    '#c9a576'
};

function drawPlayer() {
  const x = playerX();
  const y = playerY();
  const t = performance.now() / 1000;

  // Determine pose and aim
  const aiming = aimX !== null;
  const following = throwTimer > 0;
  let aimDeg = -45;
  let absAngle = -Math.PI / 4;
  if (aiming) {
    lastFacing = aimX < x ? -1 : 1;
    absAngle = Math.atan2(aimY - (y - 60), Math.abs(aimX - x));
  } else if (following) {
    absAngle = lastThrowAngle;
  }
  const facing = lastFacing;
  // Idle breathing bob
  const breathe = aiming || following ? 0 : Math.sin(t * 2) * 1.2;

  ctx.save();
  ctx.translate(x, y + breathe);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(0, 22, 36, 8, 0, 0, Math.PI * 2);
  ctx.fill();

  ctx.scale(facing, 1);

  // Helper to outline a rect
  function pix(c, x, y, w, h) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }
  function outline(x, y, w, h) {
    ctx.fillStyle = PC.outline;
    ctx.fillRect(x - 1, y, 1, h);
    ctx.fillRect(x + w, y, 1, h);
    ctx.fillRect(x, y - 1, w, 1);
    ctx.fillRect(x, y + h, w, 1);
  }

  // === BACK LEG (planted, slightly turned) ===
  pix(PC.pants, -18, -14, 13, 32);
  pix(PC.pantsShade, -18, -14, 4, 32);     // shade
  pix(PC.pantsHi, -7, -14, 2, 32);        // highlight
  outline(-18, -14, 13, 32);
  // Back boot
  pix(PC.boot, -20, 16, 17, 9);
  pix(PC.bootHi, -20, 16, 17, 2);
  outline(-20, 16, 17, 9);
  // Buckskin fringe down side of pants
  for (let i = 0; i < 4; i++) {
    pix(PC.fringe, -19, -8 + i * 7, 2, 5);
  }

  // === FRONT LEG (lead leg, planted forward when throwing) ===
  const leadOffset = (aiming || following) ? 6 : 2;
  pix(PC.pants, 5 + leadOffset - 6, -14, 13, 32);
  pix(PC.pantsShade, 5 + leadOffset - 6, -14, 3, 32);
  pix(PC.pantsHi, 14 + leadOffset - 6, -14, 2, 32);
  outline(5 + leadOffset - 6, -14, 13, 32);
  // Front boot
  pix(PC.boot, 3 + leadOffset - 6, 16, 17, 9);
  pix(PC.bootHi, 3 + leadOffset - 6, 16, 17, 2);
  outline(3 + leadOffset - 6, 16, 17, 9);
  // Fringe
  for (let i = 0; i < 4; i++) {
    pix(PC.fringe, 17 + leadOffset - 6, -8 + i * 7, 2, 5);
  }

  // === BELT ===
  pix(PC.belt, -18, -17, 36, 5);
  outline(-18, -17, 36, 5);
  // Buckle
  pix(PC.buckle, -4, -17, 8, 5);
  outline(-4, -17, 8, 5);
  pix(PC.outline, -2, -16, 4, 3);
  pix(PC.buckle, -1, -15, 2, 1);

  // === TORSO (orange jersey, broad chest) ===
  // Body twist when aiming
  const twist = aiming ? -0.15 : (following ? 0.15 : 0);
  ctx.save();
  ctx.rotate(twist);
  // Main torso block
  pix(PC.jersey, -20, -48, 40, 31);
  // Side shading
  pix(PC.jerseyShade, 14, -48, 6, 31);
  pix(PC.jerseyHi, -20, -48, 5, 31);
  outline(-20, -48, 40, 31);
  // Chest definition (muscle hint)
  pix(PC.jerseyShade, -3, -45, 6, 18);
  pix(PC.jerseyHi, -8, -45, 4, 18);
  pix(PC.jerseyHi, 3, -45, 4, 18);
  // Jersey number "T" big
  ctx.fillStyle = PC.white;
  ctx.font = 'bold 22px Impact, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('T', 0, -22);
  ctx.strokeStyle = PC.outline;
  ctx.lineWidth = 1.5;
  ctx.strokeText('T', 0, -22);
  // Buckskin fringes at bottom hem of jersey
  for (let i = 0; i < 7; i++) {
    pix(PC.fringe, -18 + i * 6, -18, 2, 6);
  }
  // Shoulder pads hint (subtle bumps)
  pix(PC.jerseyHi, -20, -50, 12, 4);
  pix(PC.jerseyHi, 8, -50, 12, 4);
  ctx.restore();

  // === OFF (FRONT) ARM ===
  // When aiming: extended forward toward target for balance/aim
  // When idle: relaxed at side
  ctx.save();
  if (aiming || following) {
    // Pivot at shoulder
    ctx.translate(8, -46);
    // Front arm points toward target
    const offArmAngle = absAngle * 0.7;
    ctx.rotate(offArmAngle);
    // Upper arm (jersey sleeve)
    pix(PC.jersey, 0, -5, 14, 11);
    pix(PC.jerseyShade, 0, 1, 14, 5);
    outline(0, -5, 14, 11);
    // Forearm (skin)
    ctx.translate(14, 0);
    ctx.rotate(0.1);
    pix(PC.skin, 0, -4, 16, 8);
    pix(PC.skinShade, 0, 1, 16, 3);
    pix(PC.skinHi, 0, -4, 16, 2);
    outline(0, -4, 16, 8);
    // Hand (pointing finger)
    pix(PC.skin, 16, -5, 8, 10);
    outline(16, -5, 8, 10);
    pix(PC.skin, 22, -3, 5, 3);   // pointing finger
    outline(22, -3, 5, 3);
  } else {
    // Hanging at side
    ctx.translate(-16, -44);
    pix(PC.jersey, -2, 0, 10, 16);
    pix(PC.jerseyShade, 4, 0, 4, 16);
    outline(-2, 0, 10, 16);
    pix(PC.skin, -2, 16, 10, 11);
    pix(PC.skinShade, 4, 16, 4, 11);
    outline(-2, 16, 10, 11);
  }
  ctx.restore();

  // === NECK ===
  pix(PC.skin, -6, -54, 12, 8);
  pix(PC.skinShade, 2, -54, 4, 8);
  outline(-6, -54, 12, 8);

  // === HEAD ===
  // Face shape (slightly turned toward target when aiming)
  const headTilt = aiming ? 0.08 : (following ? -0.08 : 0);
  ctx.save();
  ctx.translate(0, -64);
  ctx.rotate(headTilt);
  pix(PC.skin, -11, -10, 22, 20);
  pix(PC.skinShade, 7, -10, 4, 20);
  pix(PC.skinHi, -11, -10, 3, 20);
  outline(-11, -10, 22, 20);
  // Jaw / sideburns
  pix(PC.hair, -11, -2, 3, 8);
  pix(PC.hair, 8, -2, 3, 8);
  // Stubble beard
  pix(PC.beard, -8, 3, 16, 5);
  // Eye (focused, intense, looking forward)
  pix(PC.white, 2, -4, 6, 4);
  outline(2, -4, 6, 4);
  pix(PC.outline, 5, -3, 3, 3);   // pupil
  pix(PC.white, 6, -3, 1, 1);     // catch-light
  // Brow (angry/focused)
  pix(PC.hair, 1, -7, 8, 2);
  // Determined mouth
  pix(PC.outline, 1, 5, 7, 2);
  // Nose
  pix(PC.skinShade, 8, 0, 2, 3);
  ctx.restore();

  // === COONSKIN HAT ===
  // Hat brim
  pix(PC.hatDark, -15, -75, 30, 4);
  outline(-15, -75, 30, 4);
  // Hat dome (fur cap)
  pix(PC.hatMid, -13, -85, 26, 11);
  pix(PC.hatDark, -13, -85, 26, 3);
  pix(PC.hatLight, -13, -82, 4, 8);
  outline(-13, -85, 26, 11);
  // Fur texture tufts
  pix(PC.hatDark, -10, -82, 3, 2);
  pix(PC.hatDark, -4, -80, 3, 2);
  pix(PC.hatDark, 2, -83, 3, 2);
  pix(PC.hatDark, 8, -81, 3, 2);
  pix(PC.hatLight, -7, -78, 2, 1);
  pix(PC.hatLight, 4, -79, 2, 1);

  // === RACCOON TAIL (hangs to back/side) ===
  ctx.save();
  ctx.translate(-13, -75);
  ctx.rotate(-0.6);
  // Tail main
  pix(PC.hatMid, -5, 0, 11, 32);
  outline(-5, 0, 11, 32);
  // Stripes
  pix(PC.stripe, -5, 4, 11, 4);
  pix(PC.stripe, -5, 13, 11, 4);
  pix(PC.stripe, -5, 22, 11, 4);
  // Tail tip (black tuft)
  pix(PC.stripe, -4, 30, 9, 6);
  outline(-4, 30, 9, 6);
  // Highlight along left side
  pix(PC.hatLight, -5, 0, 2, 32);
  ctx.restore();

  ctx.restore(); // end facing scale

  // === THROWING ARM (drawn last, on top, with aim rotation) ===
  // World-space draw so the arm can swing freely
  ctx.save();
  ctx.translate(x, y + breathe - 44);
  ctx.scale(facing, 1);

  // Compute arm angle
  let armAngle;
  if (aiming) {
    // Cocked back: arm goes opposite of aim, ball behind ear
    armAngle = Math.PI - absAngle * 0.4;
  } else if (following) {
    // Follow-through: arm extends toward where ball went
    const tNorm = 1 - (throwTimer / 0.32);
    armAngle = Math.PI - absAngle * 0.4 + tNorm * (Math.PI - 0.6); // sweep forward
  } else {
    // Idle: ball at hip
    armAngle = Math.PI * 0.55;
  }

  ctx.rotate(armAngle);
  // Upper arm (jersey sleeve)
  ctx.fillStyle = PC.jersey;
  ctx.fillRect(0, -6, 18, 12);
  ctx.fillStyle = PC.jerseyShade;
  ctx.fillRect(0, 0, 18, 6);
  ctx.fillStyle = PC.jerseyHi;
  ctx.fillRect(0, -6, 18, 2);
  ctx.fillStyle = PC.outline;
  ctx.fillRect(-1, -6, 1, 12); ctx.fillRect(18, -6, 1, 12);
  ctx.fillRect(0, -7, 18, 1); ctx.fillRect(0, 6, 18, 1);

  // Forearm — bent for cocked, straight for follow-through
  ctx.translate(18, 0);
  let elbowBend;
  if (aiming) elbowBend = -2.1;
  else if (following) {
    const tNorm = 1 - (throwTimer / 0.32);
    elbowBend = -2.1 + tNorm * 2.1; // straightens out
  } else elbowBend = 0.5;
  ctx.rotate(elbowBend);

  // Forearm (skin, rolled sleeves)
  ctx.fillStyle = PC.skin;
  ctx.fillRect(0, -5, 18, 10);
  ctx.fillStyle = PC.skinShade;
  ctx.fillRect(0, 0, 18, 5);
  ctx.fillStyle = PC.skinHi;
  ctx.fillRect(0, -5, 18, 2);
  ctx.fillStyle = PC.outline;
  ctx.fillRect(-1, -5, 1, 10); ctx.fillRect(18, -5, 1, 10);
  ctx.fillRect(0, -6, 18, 1); ctx.fillRect(0, 5, 18, 1);

  // Hand
  ctx.fillStyle = PC.skin;
  ctx.fillRect(16, -7, 10, 14);
  ctx.fillStyle = PC.skinShade;
  ctx.fillRect(20, -7, 6, 14);
  ctx.fillStyle = PC.outline;
  ctx.fillRect(15, -7, 1, 14); ctx.fillRect(26, -7, 1, 14);
  ctx.fillRect(16, -8, 10, 1); ctx.fillRect(16, 7, 10, 1);

  // Football in hand (only when not in mid-throw release)
  if (aiming || !following) {
    ctx.save();
    ctx.translate(24, 0);
    ctx.rotate(aiming ? 0.3 : 0);
    ctx.fillStyle = PC.ball;
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = PC.ballHi;
    ctx.beginPath();
    ctx.ellipse(-2, -2, 6, 2.5, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = PC.outline;
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.ellipse(0, 0, 11, 6, 0, 0, Math.PI * 2);
    ctx.stroke();
    // Laces
    ctx.strokeStyle = PC.white;
    ctx.lineWidth = 1.4;
    ctx.beginPath();
    ctx.moveTo(-5, 0); ctx.lineTo(5, 0);
    for (let i = -3; i <= 3; i += 2) {
      ctx.moveTo(i, -2); ctx.lineTo(i, 2);
    }
    ctx.stroke();
    ctx.restore();
  }

  // Action lines on follow-through (Double Dragon "POW!" feel)
  if (following && throwTimer > 0.18) {
    ctx.strokeStyle = PC.white;
    ctx.lineWidth = 2;
    for (let i = 0; i < 3; i++) {
      ctx.beginPath();
      ctx.moveTo(-10 - i * 3, -10 - i * 4);
      ctx.lineTo(-3 - i * 2, -3 - i * 2);
      ctx.stroke();
    }
  }
  ctx.restore();
}

// ============ AIM GUIDE ============
function drawAimGuide() {
  if (aimX === null || state !== STATE.PLAYING) return;
  const px = playerX();
  const py = playerY() - 50;
  const dx = aimX - px;
  const dy = aimY - py;
  const t = 0.55 + Math.min(0.5, Math.abs(dx) / W * 0.6);
  const g = 1400;
  const vx = dx / t;
  const vy = (dy - 0.5 * g * t * t) / t;

  ctx.strokeStyle = 'rgba(255,255,255,0.4)';
  ctx.lineWidth = 2;
  ctx.setLineDash([4, 6]);
  ctx.beginPath();
  for (let i = 0; i <= 18; i++) {
    const ti = (i / 18) * t;
    const x = px + vx * ti;
    const y = py + vy * ti + 0.5 * g * ti * ti;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.stroke();
  ctx.setLineDash([]);

  // Crosshair at target
  ctx.strokeStyle = '#FF8200';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(aimX, aimY, 14, 0, Math.PI * 2);
  ctx.moveTo(aimX - 20, aimY); ctx.lineTo(aimX - 8, aimY);
  ctx.moveTo(aimX + 8, aimY); ctx.lineTo(aimX + 20, aimY);
  ctx.moveTo(aimX, aimY - 20); ctx.lineTo(aimX, aimY - 8);
  ctx.moveTo(aimX, aimY + 8); ctx.lineTo(aimX, aimY + 20);
  ctx.stroke();
}

// ============ FOOTBALL ============
function drawFootball(f) {
  // Trail
  for (let i = 0; i < f.trail.length; i++) {
    const a = i / f.trail.length;
    ctx.fillStyle = `rgba(255,255,255,${a * 0.4})`;
    ctx.beginPath();
    ctx.arc(f.trail[i].x, f.trail[i].y, 2 + a * 3, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.save();
  ctx.translate(f.x, f.y);
  ctx.rotate(f.rot);
  // Ball
  ctx.fillStyle = '#6b3410';
  ctx.beginPath();
  ctx.ellipse(0, 0, 11, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  // Highlight
  ctx.fillStyle = '#8b4818';
  ctx.beginPath();
  ctx.ellipse(-2, -2, 6, 2, 0, 0, Math.PI * 2);
  ctx.fill();
  // Laces
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(-5, 0); ctx.lineTo(5, 0);
  for (let i = -3; i <= 3; i += 2) {
    ctx.moveTo(i, -2); ctx.lineTo(i, 2);
  }
  ctx.stroke();
  ctx.restore();
}

// ============ PARTICLES & POPUPS ============
function drawParticle(p) {
  const a = Math.max(0, p.life / p.maxLife);
  ctx.fillStyle = p.color;
  ctx.globalAlpha = a;
  ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  ctx.globalAlpha = 1;
}
function drawPopup(p) {
  const a = Math.min(1, p.life);
  ctx.globalAlpha = a;
  ctx.font = `bold ${p.size}px Impact, sans-serif`;
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.strokeText(p.text, p.x, p.y);
  ctx.fillStyle = p.color;
  ctx.fillText(p.text, p.x, p.y);
  ctx.globalAlpha = 1;
}

// ============ MASCOTS ============
function drawMascot(m) {
  ctx.save();
  ctx.translate(m.x, m.y + (m.hit ? 0 : m.bob));
  if (m.hit) {
    ctx.rotate(m.rot);
  }

  // Shadow on rope
  if (!m.hit) {
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(0, 4, 22, 4, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  const facing = m.dir;
  ctx.scale(facing, 1);

  if (m.smokey) drawSmokey(m);
  else drawEnemy(m);

  ctx.restore();

  // Label (in world space, no flip)
  if (!m.hit) {
    ctx.save();
    ctx.translate(m.x, m.y + m.bob - 56);
    ctx.font = 'bold 11px Impact, sans-serif';
    ctx.textAlign = 'center';
    if (m.smokey) {
      // Smokey label - big and warning-like
      ctx.font = 'bold 14px Impact, sans-serif';
      // Pulse
      const pulse = 1 + Math.sin(performance.now() / 150) * 0.1;
      ctx.scale(pulse, pulse);
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 4;
      ctx.strokeText('★ SMOKEY ★', 0, 0);
      ctx.fillStyle = '#FF8200';
      ctx.fillText('★ SMOKEY ★', 0, 0);
    } else {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText(m.type.label, 0, 0);
      ctx.fillStyle = m.type.accent;
      ctx.fillText(m.type.label, 0, 0);
    }
    ctx.restore();
  }
}

function legs(m, color) {
  const swing = Math.sin(m.walkPhase) * 5;
  ctx.fillStyle = color;
  ctx.fillRect(-14, -2, 5, 16 + swing);
  ctx.fillRect(-4, -2, 5, 16 - swing);
  ctx.fillRect(6, -2, 5, 16 + swing);
  ctx.fillRect(14, -2, 5, 16 - swing);
}

function drawEnemy(m) {
  const t = m.type;
  // Legs first
  legs(m, t.body);

  // Body (oval)
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(0, -8, 22, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  // Accent stripe / jersey
  ctx.fillStyle = t.accent;
  ctx.fillRect(-18, -10, 36, 6);

  // Per-type head/features
  switch (t.id) {
    case 'gator': drawGatorHead(t); break;
    case 'dawg':  drawDawgHead(t); break;
    case 'tide':  drawElephantHead(t); break;
    case 'tiger': drawTigerHead(t); break;
    case 'hog':   drawHogHead(t); break;
    case 'cock':  drawCockHead(t); break;
    case 'horn':  drawHornHead(t); break;
    case 'cat':   drawCatHead(t); break;
  }

  // Angry eyebrows (universal "bad guy" cue)
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(20, -28); ctx.lineTo(28, -25);
  ctx.moveTo(34, -28); ctx.lineTo(42, -25);
  ctx.stroke();
}

function drawGatorHead(t) {
  // Snout
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(28, -16, 18, 8, 0, 0, Math.PI * 2);
  ctx.fill();
  // Head dome
  ctx.beginPath();
  ctx.ellipse(18, -22, 14, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  // Teeth
  ctx.fillStyle = '#FFF';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(18 + i * 4, -12);
    ctx.lineTo(20 + i * 4, -8);
    ctx.lineTo(22 + i * 4, -12);
    ctx.fill();
  }
  // Eye
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(22, -26, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -26, 2, 0, Math.PI * 2); ctx.fill();
  // Back ridges
  ctx.fillStyle = '#1a3008';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.moveTo(-12 + i * 6, -19);
    ctx.lineTo(-9 + i * 6, -23);
    ctx.lineTo(-6 + i * 6, -19);
    ctx.fill();
  }
}
function drawDawgHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(22, -22, 14, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  // Snout
  ctx.fillStyle = '#6b3a18';
  ctx.beginPath();
  ctx.ellipse(32, -18, 9, 7, 0, 0, Math.PI * 2);
  ctx.fill();
  // Nose
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(38, -19, 3, 0, Math.PI * 2); ctx.fill();
  // Floppy ear
  ctx.fillStyle = '#5a3414';
  ctx.beginPath();
  ctx.ellipse(15, -28, 5, 10, -0.3, 0, Math.PI * 2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(24, -24, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(25, -24, 1.8, 0, Math.PI * 2); ctx.fill();
  // Collar (red, G)
  ctx.fillStyle = t.accent;
  ctx.fillRect(14, -12, 16, 4);
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 7px Arial';
  ctx.fillText('G', 19, -9);
  // Teeth/scowl
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.moveTo(30, -14); ctx.lineTo(33, -12);
  ctx.stroke();
}
function drawElephantHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(22, -22, 15, 14, 0, 0, Math.PI * 2);
  ctx.fill();
  // Big ear
  ctx.beginPath();
  ctx.ellipse(12, -22, 9, 12, -0.2, 0, Math.PI * 2);
  ctx.fill();
  // Trunk
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.moveTo(32, -22);
  ctx.quadraticCurveTo(44, -16, 38, -6);
  ctx.quadraticCurveTo(34, -2, 30, -4);
  ctx.quadraticCurveTo(28, -10, 28, -18);
  ctx.fill();
  // Tusks
  ctx.fillStyle = '#FFF8DC';
  ctx.beginPath();
  ctx.moveTo(28, -14);
  ctx.lineTo(34, -6);
  ctx.lineTo(30, -10);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(22, -24, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -24, 1.8, 0, Math.PI * 2); ctx.fill();
  // Houndstooth-ish blanket
  ctx.fillStyle = t.accent;
  ctx.fillRect(-18, -10, 36, 5);
}
function drawTigerHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(22, -22, 13, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  // Stripes
  ctx.fillStyle = '#000';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(15 + i * 4, -32, 2, 6);
    ctx.fillRect(-15 + i * 8, -16, 2, 10);
  }
  // Ears
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.moveTo(14, -30); ctx.lineTo(18, -36); ctx.lineTo(20, -28);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(28, -30); ctx.lineTo(31, -36); ctx.lineTo(33, -28);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#FDD023';
  ctx.beginPath(); ctx.arc(19, -23, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(28, -23, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.fillRect(18.5, -24, 1, 3);
  ctx.fillRect(27.5, -24, 1, 3);
  // Snout / fangs
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(23, -17, 4, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -18, 1.5, 0, Math.PI * 2); ctx.fill();
}
function drawHogHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(24, -20, 14, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  // Snout disc
  ctx.fillStyle = '#a85555';
  ctx.beginPath();
  ctx.ellipse(34, -18, 7, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(34, -19, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(36, -17, 1.5, 0, Math.PI * 2); ctx.fill();
  // Eye
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(22, -22, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -22, 1.8, 0, Math.PI * 2); ctx.fill();
  // Mohawk ridge of bristles
  ctx.strokeStyle = '#5a2a2a';
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(-10 + i * 7, -20);
    ctx.lineTo(-12 + i * 7, -28);
    ctx.stroke();
  }
  // Tusks
  ctx.fillStyle = '#FFF8DC';
  ctx.beginPath();
  ctx.moveTo(28, -15); ctx.lineTo(32, -10); ctx.lineTo(30, -16);
  ctx.fill();
}
function drawCockHead(t) {
  // Replace body with rooster-y shape
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(15, -20, 14, 16, 0, 0, Math.PI * 2);
  ctx.fill();
  // Comb (red zigzag on top)
  ctx.fillStyle = '#FF0000';
  ctx.beginPath();
  ctx.moveTo(8, -32);
  ctx.lineTo(12, -38); ctx.lineTo(15, -33);
  ctx.lineTo(18, -38); ctx.lineTo(22, -33);
  ctx.lineTo(20, -28);
  ctx.fill();
  // Beak
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(28, -22); ctx.lineTo(38, -19); ctx.lineTo(28, -16);
  ctx.fill();
  // Wattle
  ctx.fillStyle = '#FF0000';
  ctx.beginPath();
  ctx.ellipse(26, -12, 4, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(22, -24, 3.5, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -24, 2, 0, Math.PI * 2); ctx.fill();
  // Tail feathers
  ctx.fillStyle = '#FFD700';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.ellipse(-12 - i * 2, -16 - i * 4, 4, 10, 0.5 + i * 0.2, 0, Math.PI * 2);
    ctx.fill();
  }
}
function drawHornHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(22, -22, 14, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  // Big horns
  ctx.strokeStyle = '#FFF8DC';
  ctx.lineWidth = 4;
  ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(22, -32);
  ctx.quadraticCurveTo(0, -36, -10, -28);
  ctx.moveTo(22, -32);
  ctx.quadraticCurveTo(44, -36, 50, -28);
  ctx.stroke();
  // Snout
  ctx.fillStyle = '#FFF';
  ctx.beginPath();
  ctx.ellipse(30, -16, 7, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(33, -17, 1.5, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(33, -14, 1.5, 0, Math.PI * 2); ctx.fill();
  // Eye
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(22, -23, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -23, 1.8, 0, Math.PI * 2); ctx.fill();
}
function drawCatHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(22, -22, 13, 12, 0, 0, Math.PI * 2);
  ctx.fill();
  // Pointy ears
  ctx.beginPath();
  ctx.moveTo(13, -28); ctx.lineTo(16, -38); ctx.lineTo(20, -28);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(26, -28); ctx.lineTo(30, -38); ctx.lineTo(33, -28);
  ctx.fill();
  // Eyes
  ctx.fillStyle = '#FFEC00';
  ctx.beginPath(); ctx.arc(19, -22, 3, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.arc(27, -22, 3, 0, Math.PI * 2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.fillRect(18.5, -24, 1, 4);
  ctx.fillRect(26.5, -24, 1, 4);
  // Nose & mouth
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.moveTo(23, -16); ctx.lineTo(25, -16); ctx.lineTo(24, -14);
  ctx.fill();
  // Whiskers
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(20, -14); ctx.lineTo(10, -15);
  ctx.moveTo(20, -13); ctx.lineTo(11, -12);
  ctx.moveTo(28, -14); ctx.lineTo(38, -15);
  ctx.moveTo(28, -13); ctx.lineTo(37, -12);

}

// ============ SMOKEY (THE GOOD BOY) ============
function drawSmokey(m) {
  // Aura — clear visual cue this is friendly
  const glow = 1 + Math.sin(performance.now() / 200) * 0.2;
  ctx.fillStyle = `rgba(255,130,0,${0.15 * glow})`;
  ctx.beginPath();
  ctx.arc(10, -15, 42, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = `rgba(255,255,255,${0.18 * glow})`;
  ctx.beginPath();
  ctx.arc(10, -15, 32, 0, Math.PI * 2);
  ctx.fill();

  // Legs (white)
  const swing = Math.sin(m.walkPhase) * 5;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(-14, -2, 5, 16 + swing);
  ctx.fillRect(-4, -2, 5, 16 - swing);
  ctx.fillRect(6, -2, 5, 16 + swing);
  ctx.fillRect(14, -2, 5, 16 - swing);

  // Body (white with orange spots)
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(0, -8, 22, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  // Orange spots
  ctx.fillStyle = '#FF8200';
  ctx.beginPath(); ctx.ellipse(-8, -10, 7, 5, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -6, 6, 4, 0, 0, Math.PI * 2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(12, -12, 5, 3, 0, 0, Math.PI * 2); ctx.fill();

  // Big "T" on side
  ctx.fillStyle = '#FF8200';
  ctx.font = 'bold 12px Impact';
  ctx.textAlign = 'center';
  ctx.fillText('T', 0, -5);

  // Head
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(22, -20, 13, 11, 0, 0, Math.PI * 2);
  ctx.fill();
  // Floppy orange ears (the giveaway!)
  ctx.fillStyle = '#FF8200';
  ctx.save();
  ctx.translate(16, -22);
  ctx.rotate(-0.3);
  ctx.beginPath();
  ctx.ellipse(0, 6, 6, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.translate(28, -22);
  ctx.rotate(0.3);
  ctx.beginPath();
  ctx.ellipse(0, 6, 6, 13, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Snout
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(32, -16, 8, 6, 0, 0, Math.PI * 2);
  ctx.fill();
  // Nose
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(38, -18, 2.5, 0, Math.PI * 2); ctx.fill();
  // Smile (happy curve, NOT angry)
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(33, -14, 4, 0.2, Math.PI - 0.2);
  ctx.stroke();
  // Tongue
  ctx.fillStyle = '#FF69B4';
  ctx.beginPath();
  ctx.ellipse(34, -10, 4, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();

  // Eye (big, happy)
  ctx.fillStyle = '#000';
  if (m.blink > 0.1) {
    ctx.beginPath(); ctx.arc(24, -22, 2.5, 0, Math.PI * 2); ctx.fill();
    // Eye sparkle
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(25, -23, 0.8, 0, Math.PI * 2); ctx.fill();
  } else {
    // Blinking - happy line
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(21, -22); ctx.lineTo(27, -22);
    ctx.stroke();
  }

  // Wagging tail
  const wag = Math.sin(m.walkPhase * 3) * 0.5;
  ctx.save();
  ctx.translate(-22, -14);
  ctx.rotate(-0.4 + wag);
  ctx.fillStyle = '#FF8200';
  ctx.fillRect(0, -3, 14, 6);
  ctx.beginPath();
  ctx.ellipse(14, 0, 3, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // White tip
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(14, 0, 2, 2.5, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();

  // Power "T" collar
  ctx.fillStyle = '#FF8200';
  ctx.fillRect(14, -12, 16, 4);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 7px Arial';
  ctx.fillText('T', 22, -9);
}

// ============ UI ============
function updateBallsUI() {
  const el = document.getElementById('ballCount');
  el.textContent = ballsLeft;
  el.classList.remove('low', 'critical');
  if (ballsLeft <= 3) el.classList.add('critical');
  else if (ballsLeft <= 6) el.classList.add('low');
}

// ============ INPUT ============
function getEventPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches && e.touches.length) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}

function handleAim(e) {
  if (state !== STATE.PLAYING) return;
  const p = getEventPos(e);
  aimX = p.x; aimY = p.y;
}
function handleRelease(e) {
  if (state !== STATE.PLAYING) return;
  e.preventDefault();
  ensureAudio();
  if (aimX !== null) {
    throwBall(aimX, aimY);
  }
  aimX = null; aimY = null;
}
function handlePress(e) {
  if (state !== STATE.PLAYING) return;
  e.preventDefault();
  ensureAudio();
  const p = getEventPos(e);
  aimX = p.x; aimY = p.y;
}

canvas.addEventListener('mousedown', handlePress);
canvas.addEventListener('mousemove', (e) => { if (aimX !== null) handleAim(e); });
canvas.addEventListener('mouseup', handleRelease);
canvas.addEventListener('mouseleave', () => { aimX = null; aimY = null; });

canvas.addEventListener('touchstart', handlePress, { passive: false });
canvas.addEventListener('touchmove', (e) => { e.preventDefault(); handleAim(e); }, { passive: false });
canvas.addEventListener('touchend', handleRelease, { passive: false });
canvas.addEventListener('touchcancel', () => { aimX = null; aimY = null; });

// Prevent context menu
canvas.addEventListener('contextmenu', e => e.preventDefault());

// ============ GAME START/END ============
function startGame() {
  ensureAudio();
  state = STATE.PLAYING;
  score = 0;
  ballsLeft = MAX_BALLS;
  mascots = [];
  footballs = [];
  particles = [];
  popups = [];
  timeAlive = 0;
  spawnTimer = 800;
  shake = 0;
  document.getElementById('title').classList.add('hidden');
  document.getElementById('gameover').classList.add('hidden');
  document.getElementById('score').textContent = '0';
  updateBallsUI();
  beep(440, 0.1, 'square', 0.1);
  setTimeout(() => beep(660, 0.1, 'square', 0.1), 80);
  setTimeout(() => beep(880, 0.15, 'square', 0.1), 160);
}

function endGame() {
  state = STATE.OVER;
  let savedScore = undefined;
  if (qualifiesForLeaderboard(score)) {
    let initials = '';
    try {
      const input = window.prompt('NEW HIGH SCORE! Enter your initials (up to 8 chars):', 'YOU');
      if (input !== null) initials = input.trim().toUpperCase().substring(0, 8);
    } catch (e) {}
    if (!initials) initials = 'VOL';
    saveHighScore(initials, score);
    savedScore = score;
  }
  renderHighScores(document.getElementById('gameoverHighscores'), savedScore);
  document.getElementById('finalScore').textContent = score.toLocaleString();
  document.getElementById('gameover').classList.remove('hidden');
  beep(220, 0.3, 'sawtooth', 0.12);
  setTimeout(() => beep(180, 0.4, 'sawtooth', 0.12), 200);
  setTimeout(() => beep(120, 0.6, 'sawtooth', 0.12), 450);
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// ============ MAIN LOOP ============
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
updateBallsUI();
renderHighScores(document.getElementById('titleHighscores'));
requestAnimationFrame((t) => { lastTime = t; loop(t); });

})();
</script>
