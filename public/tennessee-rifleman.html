<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#FF8200">
<title>Tennessee Rifleman — Crockett's Hunt</title>
<style>
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; padding: 0; height: 100%; width: 100%;
    overflow: hidden; background: #1a2a0a;
    font-family: 'Impact', 'Arial Black', sans-serif;
    user-select: none; -webkit-user-select: none;
    touch-action: none;
  }
  #game { display: block; position: absolute; top: 0; left: 0; cursor: crosshair; }

  #ui {
    position: absolute; top: 0; left: 0; right: 0;
    display: flex; justify-content: space-between;
    align-items: center;
    padding: 14px 18px; pointer-events: none;
    font-family: 'Impact', 'Arial Black', sans-serif;
    z-index: 10;
  }
  #shotsBox {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.45);
    padding: 6px 14px;
    border: 3px solid #FFF;
    border-radius: 30px;
    box-shadow: 0 4px 0 #5b3216, inset 0 0 0 2px #8B4513;
  }
  .bullet-icon {
    width: 8px; height: 22px;
    background: linear-gradient(to bottom, #C9A300 0%, #FFD700 30%, #8B6914 100%);
    border: 2px solid #2a1a04;
    border-radius: 3px 3px 1px 1px;
    flex-shrink: 0;
    position: relative;
  }
  .bullet-icon::before {
    content: ''; position: absolute;
    top: -5px; left: -2px; right: -2px;
    height: 6px;
    background: #C9A300;
    border: 2px solid #2a1a04;
    border-bottom: none;
    border-radius: 50% 50% 0 0;
  }
  #shotCount {
    font-size: 30px; color: #FFF;
    text-shadow: 2px 2px 0 #5b3216, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    letter-spacing: 1px; min-width: 30px; text-align: center;
  }
  #shotCount.low { color: #FFE066; animation: pulseLow 0.6s infinite alternate; }
  #shotCount.critical { color: #FF3344; animation: pulseLow 0.3s infinite alternate; }
  @keyframes pulseLow { from { transform: scale(1); } to { transform: scale(1.15); } }
  #shotLabel { font-size: 16px; color: #FFE0B0; letter-spacing: 2px; }

  #score {
    font-size: 32px; color: #FFF;
    text-shadow: 3px 3px 0 #FF8200, -1px -1px 0 #000, 1px -1px 0 #000, -1px 1px 0 #000, 1px 1px 0 #000;
    letter-spacing: 2px;
    background: rgba(0,0,0,0.45);
    padding: 4px 16px;
    border: 3px solid #FFF;
    border-radius: 30px;
    box-shadow: 0 4px 0 #5b3216;
  }

  #reloadBar {
    position: absolute; bottom: 100px; left: 50%;
    transform: translateX(-50%);
    width: 200px; height: 14px;
    background: rgba(0,0,0,0.5);
    border: 2px solid #FFF;
    border-radius: 8px;
    overflow: hidden;
    display: none;
    z-index: 9;
  }
  #reloadBar.active { display: block; }
  #reloadFill {
    height: 100%;
    background: linear-gradient(to right, #8B6914, #FFD700);
    width: 0%;
    transition: width 0.05s linear;
  }
  #reloadLabel {
    position: absolute; bottom: 120px; left: 50%;
    transform: translateX(-50%);
    color: #FFD700;
    font-size: 14px; letter-spacing: 3px;
    text-shadow: 2px 2px 0 #000;
    display: none;
    z-index: 9;
  }
  #reloadLabel.active { display: block; }

  .overlay {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: radial-gradient(circle, rgba(20,30,10,0.85) 0%, rgba(5,10,2,0.95) 100%);
    z-index: 20; padding: 20px;
    text-align: center;
    overflow-y: auto;
  }
  .overlay.hidden { display: none; }
  .overlay h1 {
    font-size: clamp(36px, 9vw, 80px);
    color: #FF8200; margin: 0 0 8px;
    text-shadow: 4px 4px 0 #000, 6px 6px 0 rgba(255,255,255,0.2);
    letter-spacing: 3px; line-height: 0.95;
  }
  .overlay h2 {
    font-size: clamp(32px, 7vw, 60px);
    color: #FFF; margin: 0 0 12px;
    text-shadow: 4px 4px 0 #FF8200, 6px 6px 0 #000;
    letter-spacing: 2px;
  }
  .overlay .subtitle {
    color: #FFD89E; font-size: clamp(14px, 3vw, 19px);
    margin: 0 0 18px; max-width: 520px;
    line-height: 1.45; letter-spacing: 1px;
    font-family: 'Arial', sans-serif; font-weight: bold;
  }
  .overlay button {
    background: #FF8200; color: #FFF;
    font-family: inherit; font-size: clamp(20px, 5vw, 32px);
    border: 4px solid #FFF; border-radius: 50px;
    padding: 14px 40px; cursor: pointer;
    letter-spacing: 3px;
    box-shadow: 0 6px 0 #B85A00, 0 8px 20px rgba(0,0,0,0.5);
    transition: all 0.1s; transform: translateY(0);
    margin-top: 8px;
  }
  .overlay button:active {
    transform: translateY(4px);
    box-shadow: 0 2px 0 #B85A00, 0 4px 10px rgba(0,0,0,0.5);
  }

  .hof {
    background: rgba(0,0,0,0.6);
    border: 3px solid #FFD700;
    border-radius: 12px;
    padding: 12px 20px;
    margin: 14px auto;
    max-width: 420px;
    box-shadow: 0 0 30px rgba(255,215,0,0.4);
  }
  .hof-title {
    color: #FFD700; font-size: 20px;
    text-align: center; letter-spacing: 3px;
    margin: 0 0 8px;
    text-shadow: 2px 2px 0 #000;
  }
  .hs-table {
    width: 100%; color: #FFF;
    font-family: 'Arial Black', 'Arial', sans-serif;
    font-size: 15px; border-collapse: collapse;
  }
  .hs-table td { padding: 3px 4px; }
  .hs-table .rank { color: #FFD700; width: 28px; text-align: right; font-weight: bold; }
  .hs-table .name { color: #FFF; letter-spacing: 1px; }
  .hs-table .dots { color: rgba(255,255,255,0.3); }
  .hs-table .score-col { text-align: right; color: #FF8200; font-family: 'Impact'; font-size: 17px; }
  .hs-table tr.you td, .hs-table tr.you .score-col { color: #FFE066; }
  .hs-table tr.legend td, .hs-table tr.legend .score-col { color: #FFD700; }

  #finalScore {
    color: #FF8200; font-size: clamp(40px, 10vw, 70px);
    text-shadow: 3px 3px 0 #000;
    margin: 8px 0 12px;
  }
  .stats {
    color: #FFD89E; font-size: 16px;
    font-family: 'Arial', sans-serif; font-weight: bold;
    margin: 0 0 18px; letter-spacing: 1px;
  }
</style>
</head>
<body><div id="tdt-back-bar" style="position:fixed;top:0;left:0;right:0;z-index:9999;background:rgba(26,16,48,0.85);padding:7px 18px;display:flex;align-items:center;justify-content:space-between;font-family:Georgia,serif;pointer-events:auto;">
  <a href="/arcade" style="color:#FF6600;font-size:11px;letter-spacing:0.18em;text-transform:uppercase;text-decoration:none;font-weight:700;">← Arcade</a>
  <span style="color:#8B7355;font-size:10px;letter-spacing:0.14em;text-transform:uppercase;">Touchdown Tennessee</span>
</div>

<canvas id="game"></canvas>
<div id="ui">
  <div id="shotsBox">
    <div class="bullet-icon"></div>
    <div id="shotCount">20</div>
    <div id="shotLabel">SHOTS</div>
  </div>
  <div id="score">0</div>
</div>
<div id="reloadLabel">RELOADING…</div>
<div id="reloadBar"><div id="reloadFill"></div></div>

<div id="title" class="overlay">
  <h1>TENNESSEE<br>RIFLEMAN</h1>
  <p class="subtitle">CROCKETT'S HUNT<br>
    Aim with your cursor. Click or tap to fire your long rifle.<br>
    Hit SEC critters — but spare Smokey!<br>
    20 shots. 1½ second reload between each.</p>
  <div class="hof">
    <div class="hof-title">★ HALL OF FAME ★</div>
    <table class="hs-table" id="titleHighscores"></table>
  </div>
  <button id="startBtn">START HUNT</button>
</div>

<div id="gameover" class="overlay hidden">
  <h2>HUNT OVER</h2>
  <div id="finalScore">0</div>
  <div class="stats" id="finalStats"></div>
  <div class="hof">
    <div class="hof-title">★ HALL OF FAME ★</div>
    <table class="hs-table" id="gameoverHighscores"></table>
  </div>
  <button id="restartBtn">HUNT AGAIN</button>
</div>

<script>
(function() {
'use strict';

// ============ CANVAS SETUP ============
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
let W = 0, H = 0;
const DPR = Math.min(window.devicePixelRatio || 1, 2);

function resize() {
  W = window.innerWidth;
  H = window.innerHeight;
  canvas.width = W * DPR;
  canvas.height = H * DPR;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(DPR, 0, 0, DPR, 0, 0);
}
window.addEventListener('resize', resize);
resize();

// ============ GAME STATE ============
const STATE = { TITLE: 0, PLAYING: 1, OVER: 2 };
const MAX_SHOTS = 20;
const RELOAD_TIME = 0.8;
const HUNTER_SCALE = 1.6;
let state = STATE.TITLE;
let score = 0;
let shotsLeft = MAX_SHOTS;
let reloadTimer = 0;
let recoil = 0;          // 0..1
let muzzleFlash = 0;     // 0..0.1 seconds remaining
let mascots = [];
let tracers = [];
let particles = [];
let popups = [];
let smokePuffs = [];
let clouds = [];
let treesFar = [];
let treesNear = [];
let bushes = [];
let rocks = [];
let butterflies = [];
let crosshair = { x: -1, y: -1, visible: false };
let spawnTimer = 800;
let timeAlive = 0;
let lastTime = performance.now();
let shake = 0;
let stats = { hits: 0, misses: 0, smokey: 0 };

function hunterX() { return W * 0.5; }
function hunterY() { return H - 60; }
function muzzleAnchorX() { return W * 0.5; }
function muzzleAnchorY() { return hunterY() - 58 * HUNTER_SCALE; } // shoulder height

// Init decorations
function initScene() {
  clouds = [];
  for (let i = 0; i < 6; i++) {
    clouds.push({
      x: Math.random() * 2000,
      y: 20 + Math.random() * 100,
      s: 0.7 + Math.random() * 0.9,
      v: 4 + Math.random() * 8
    });
  }
  treesFar = [];
  for (let i = 0; i < 24; i++) {
    treesFar.push({
      x: Math.random() * W,
      h: 30 + Math.random() * 40,
      type: Math.random() < 0.5 ? 'pine' : 'deciduous'
    });
  }
  treesNear = [];
  for (let i = 0; i < 10; i++) {
    treesNear.push({
      x: Math.random() * W,
      h: 50 + Math.random() * 30,
      type: Math.random() < 0.6 ? 'pine' : 'deciduous'
    });
  }
  bushes = [];
  for (let i = 0; i < 14; i++) {
    bushes.push({
      x: Math.random() * W,
      y: H * (0.78 + Math.random() * 0.08),
      s: 0.7 + Math.random() * 0.7
    });
  }
  rocks = [];
  for (let i = 0; i < 8; i++) {
    rocks.push({
      x: Math.random() * W,
      y: H * (0.82 + Math.random() * 0.06),
      s: 0.7 + Math.random() * 1.0
    });
  }
  butterflies = [];
  for (let i = 0; i < 5; i++) {
    butterflies.push({
      x: Math.random() * W,
      y: H * (0.55 + Math.random() * 0.2),
      phase: Math.random() * Math.PI * 2,
      v: 15 + Math.random() * 20
    });
  }
}
initScene();
window.addEventListener('resize', initScene);

// ============ AUDIO ============
let audioCtx = null;
function ensureAudio() {
  if (!audioCtx) {
    try { audioCtx = new (window.AudioContext || window.webkitAudioContext)(); }
    catch(e) {}
  }
}
function beep(freq, dur, type='square', vol=0.08, slide=0) {
  if (!audioCtx) return;
  try {
    const o = audioCtx.createOscillator();
    const g = audioCtx.createGain();
    o.type = type;
    o.frequency.setValueAtTime(freq, audioCtx.currentTime);
    if (slide) o.frequency.exponentialRampToValueAtTime(Math.max(40, freq + slide), audioCtx.currentTime + dur);
    g.gain.setValueAtTime(vol, audioCtx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + dur);
    o.connect(g).connect(audioCtx.destination);
    o.start();
    o.stop(audioCtx.currentTime + dur + 0.05);
  } catch(e) {}
}
function gunshotSound() {
  if (!audioCtx) return;
  try {
    // Noise burst for the crack
    const bufLen = audioCtx.sampleRate * 0.18;
    const buf = audioCtx.createBuffer(1, bufLen, audioCtx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufLen; i++) {
      const t = i / bufLen;
      data[i] = (Math.random() * 2 - 1) * Math.pow(1 - t, 2);
    }
    const src = audioCtx.createBufferSource();
    src.buffer = buf;
    const g = audioCtx.createGain();
    g.gain.value = 0.25;
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'lowpass';
    filter.frequency.value = 1800;
    src.connect(filter).connect(g).connect(audioCtx.destination);
    src.start();
    // Low boom under it
    beep(85, 0.18, 'sawtooth', 0.18, -50);
  } catch (e) {}
}
function reloadClick() {
  beep(420, 0.04, 'square', 0.06);
  setTimeout(() => beep(280, 0.05, 'square', 0.05), 80);
}

// ============ HIGH SCORES ============
const HS_KEY = 'tn_rifleman_highscores_v2';
const LEGEND_NAME = 'P. MANNING';
const LEGEND_SCORE = 1000000;
const DEFAULT_HS = [
  { name: LEGEND_NAME, score: LEGEND_SCORE, legend: true },
  { name: 'T. FOWKE',   score: 600 },
  { name: 'B. WEAKLEY', score: 400 },
  { name: 'P. WELKER',  score: 200 }
];
function loadHighScores() {
  let list = null;
  try {
    const raw = localStorage.getItem(HS_KEY);
    if (raw) list = JSON.parse(raw);
  } catch (e) {}
  if (!Array.isArray(list) || list.length === 0) {
    list = DEFAULT_HS.map(e => ({ ...e }));
  }
  list = list.filter(e => !(e.name === LEGEND_NAME && e.score >= LEGEND_SCORE));
  list.unshift({ name: LEGEND_NAME, score: LEGEND_SCORE, legend: true });
  list.sort((a, b) => b.score - a.score);
  return list.slice(0, 5);
}
function saveHighScore(name, sc) {
  const list = loadHighScores().filter(e => !e.legend);
  list.push({ name, score: sc });
  list.sort((a, b) => b.score - a.score);
  const top = list.slice(0, 4);
  try { localStorage.setItem(HS_KEY, JSON.stringify(top)); } catch (e) {}
  return loadHighScores();
}
function qualifiesForLeaderboard(sc) {
  if (sc <= 0) return false;
  const list = loadHighScores();
  if (list.length < 5) return true;
  return sc > list[list.length - 1].score;
}
function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({
    '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
  }[c]));
}
function renderHighScores(tableEl, highlightScore) {
  const list = loadHighScores();
  let html = '';
  let highlighted = false;
  list.forEach((entry, i) => {
    let cls = '';
    if (entry.legend) cls = 'legend';
    else if (!highlighted && highlightScore !== undefined && entry.score === highlightScore) {
      cls = 'you';
      highlighted = true;
    }
    html += `<tr class="${cls}">` +
      `<td class="rank">${i + 1}.</td>` +
      `<td class="name">${escapeHtml(entry.name)}</td>` +
      `<td class="dots">.....</td>` +
      `<td class="score-col">${entry.score.toLocaleString()}</td></tr>`;
  });
  tableEl.innerHTML = html;
}

// ============ MASCOT TYPES ============
// Behavior-driven: each has a unique motion pattern that suits its real-world animal.
const ENEMIES = [
  {
    id:'horn', label:'HORNS', body:'#BF5700', accent:'#FFFFFF', alt:'#000000',
    points:250, speedMult:0.55, weight:0.8, size:1.25, track:'ground', motion:'plod'
  },
  {
    id:'tide', label:'TIDE', body:'#8E939A', accent:'#9E1B32', alt:'#FFFFFF',
    points:200, speedMult:0.7, weight:1.0, size:1.2, track:'ground', motion:'lumber'
  },
  {
    id:'cock', label:'COCKS', body:'#7B0011', accent:'#000000', alt:'#FFD700',
    points:175, speedMult:0.95, weight:1.0, size:0.85, track:'sky', motion:'flap'
  },
  {
    id:'gator', label:'GATOR', body:'#2D5016', accent:'#FA4616', alt:'#0021A5',
    points:175, speedMult:0.75, weight:1.0, size:0.95, track:'low', motion:'crawl'
  },
  {
    id:'tiger', label:'TIGER', body:'#E2A92F', accent:'#461D7C', alt:'#000000',
    points:150, speedMult:1.4, weight:1.2, size:1.0, track:'ground', motion:'sprint'
  },
  {
    id:'dawg', label:'DAWGS', body:'#7B4B23', accent:'#BA0C2F', alt:'#000000',
    points:150, speedMult:0.95, weight:1.2, size:1.0, track:'ground', motion:'stopgo'
  },
  {
    id:'hog', label:'HOGS', body:'#D49090', accent:'#9D2235', alt:'#FFFFFF',
    points:125, speedMult:1.1, weight:1.3, size:0.9, track:'low', motion:'charge'
  },
  {
    id:'cat', label:'CATS', body:'#1B3D8F', accent:'#FFFFFF', alt:'#A2AAAD',
    points:75, speedMult:1.65, weight:1.4, size:0.8, track:'ground', motion:'sprint'
  }
];
function pickEnemy() {
  const total = ENEMIES.reduce((s, e) => s + e.weight, 0);
  let r = Math.random() * total;
  for (const e of ENEMIES) { r -= e.weight; if (r <= 0) return e; }
  return ENEMIES[0];
}

function trackY(track) {
  switch (track) {
    case 'sky':    return H * (0.32 + Math.random() * 0.1);
    case 'low':    return H * 0.745;
    case 'ground':
    default:       return H * 0.68;
  }
}

// ============ SPAWN ============
function spawnMascot() {
  const dir = Math.random() < 0.5 ? 1 : -1;
  const margin = 80;
  const x = dir === 1 ? -margin : W + margin;
  const difficulty = Math.min(1, timeAlive / 60000);
  const baseSpeed = 55 + difficulty * 65;

  // Smokey appearance scales up (forces target ID)
  const smokeyChance = 0.16 + difficulty * 0.18;
  const aliveSmokeys = mascots.filter(m => m.smokey && !m.hit).length;
  const isSmokey = aliveSmokeys < 1 && Math.random() < smokeyChance;

  const type = isSmokey ? null : pickEnemy();
  const track = isSmokey ? 'ground' : type.track;
  const y = trackY(track);
  const speedMult = isSmokey ? 0.9 : type.speedMult;
  const speed = (baseSpeed + Math.random() * 25) * speedMult;
  const motion = isSmokey ? 'happy' : type.motion;

  mascots.push({
    x, y, baseY: y, dir,
    vx: dir * speed, baseVx: dir * speed,
    smokey: isSmokey, type: type,
    size: isSmokey ? 1.0 : type.size,
    motion, motionPhase: 0,
    walkPhase: Math.random() * Math.PI * 2,
    bob: 0,
    hit: false, hitTimer: 0,
    rot: 0, rotDir: 1,
    blink: Math.random() * 3
  });
}

// ============ FIRE ============
function fire(tx, ty) {
  if (state !== STATE.PLAYING) return;
  if (shotsLeft <= 0) {
    beep(120, 0.05, 'square', 0.06); // empty click — out of ammo
    return;
  }
  if (reloadTimer > 0) {
    beep(180, 0.04, 'square', 0.05); // dry-fire click — still reloading
    return;
  }

  shotsLeft--;
  reloadTimer = RELOAD_TIME;
  recoil = 1;
  muzzleFlash = 0.12;
  updateShotsUI();
  shake = Math.max(shake, 4);

  // Compute muzzle position based on current aim
  const mx = muzzleAnchorX();
  const my = muzzleAnchorY();
  const ang = Math.atan2(ty - my, tx - mx);
  const barrelLen = 90 * HUNTER_SCALE;
  const muzzleX = mx + Math.cos(ang) * barrelLen;
  const muzzleY = my + Math.sin(ang) * barrelLen;

  // Visual tracer
  tracers.push({
    x1: muzzleX, y1: muzzleY,
    x2: tx, y2: ty,
    life: 0.12, maxLife: 0.12
  });
  // Muzzle smoke
  for (let i = 0; i < 8; i++) {
    smokePuffs.push({
      x: muzzleX + (Math.random() - 0.5) * 6,
      y: muzzleY + (Math.random() - 0.5) * 6,
      vx: Math.cos(ang) * (60 + Math.random() * 40) + (Math.random() - 0.5) * 20,
      vy: Math.sin(ang) * (60 + Math.random() * 40) - 40,
      r: 5 + Math.random() * 6,
      life: 0.5 + Math.random() * 0.4,
      maxLife: 0.5 + Math.random() * 0.4
    });
  }

  gunshotSound();

  // Hit detection — closest mascot within radius
  let hit = null;
  let bestDist = Infinity;
  for (const m of mascots) {
    if (m.hit) continue;
    const r = 36 * m.size;
    const dx = tx - m.x;
    const dy = ty - (m.y - 18 * m.size);
    const d2 = dx*dx + dy*dy;
    if (d2 < r * r && d2 < bestDist) {
      bestDist = d2;
      hit = m;
    }
  }
  if (hit) {
    onHit(hit, tx, ty);
  } else {
    stats.misses++;
  }

  if (shotsLeft <= 0) {
    // Game ends after the last reload, so the user sees the recoil/smoke
  }
}

function onHit(m, tx, ty) {
  m.hit = true;
  m.hitTimer = 0;
  m.rotDir = Math.random() < 0.5 ? -1 : 1;
  shake = Math.max(shake, 7);

  if (m.smokey) {
    score = Math.max(0, score - 500);
    stats.smokey++;
    spawnExplosion(m.x, m.y - 20, '#FF8200', 30);
    spawnExplosion(m.x, m.y - 20, '#FFFFFF', 16);
    popups.push({ x: m.x, y: m.y - 40, text: 'NOT SMOKEY!', color: '#FF3344', life: 1.6, vy: -50, size: 22 });
    popups.push({ x: m.x, y: m.y - 65, text: '-500', color: '#FFF', life: 1.6, vy: -50, size: 18 });
    beep(140, 0.5, 'sawtooth', 0.14, -100);
    beep(90, 0.6, 'sawtooth', 0.12, -50);
  } else {
    const pts = m.type.points;
    score += pts;
    stats.hits++;
    spawnExplosion(m.x, m.y - 20, m.type.accent, 18);
    spawnExplosion(m.x, m.y - 20, '#FFD700', 12);
    // Feather/fur puff
    for (let i = 0; i < 10; i++) {
      particles.push({
        x: m.x, y: m.y - 20,
        vx: (Math.random() - 0.5) * 220,
        vy: (Math.random() - 0.8) * 180,
        color: m.type.body,
        size: 3 + Math.random() * 3,
        life: 0.6 + Math.random() * 0.4,
        maxLife: 0.6 + Math.random() * 0.4
      });
    }
    const popColor = pts >= 200 ? '#FFD700' : pts >= 125 ? '#FFFFFF' : '#FFB366';
    const popSize  = pts >= 200 ? 28 : pts >= 125 ? 24 : 20;
    popups.push({ x: m.x, y: m.y - 40, text: '+' + pts, color: popColor, life: 1.2, vy: -60, size: popSize });
    const baseHz = 660 + Math.min(pts, 250) * 1.3;
    beep(baseHz, 0.08, 'square', 0.1);
    beep(baseHz * 1.5, 0.12, 'square', 0.08);
  }
}

function spawnExplosion(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = 80 + Math.random() * 240;
    particles.push({
      x, y, vx: Math.cos(a) * s, vy: Math.sin(a) * s - 60,
      color, size: 2 + Math.random() * 5,
      life: 0.4 + Math.random() * 0.6,
      maxLife: 0.4 + Math.random() * 0.6
    });
  }
}

// ============ UPDATE ============
function update(dt) {
  if (shake > 0) shake = Math.max(0, shake - dt * 30);
  if (recoil > 0) recoil = Math.max(0, recoil - dt * 3);
  if (muzzleFlash > 0) muzzleFlash = Math.max(0, muzzleFlash - dt);

  // Animate clouds and butterflies always (even on title)
  for (const c of clouds) {
    c.x += c.v * dt;
    if (c.x > W + 100) c.x = -100;
  }
  for (const b of butterflies) {
    b.phase += dt * 3;
    b.x += Math.cos(b.phase * 0.4) * b.v * dt;
    b.y += Math.sin(b.phase) * 0.4;
    if (b.x > W + 30) b.x = -30;
    if (b.x < -30) b.x = W + 30;
  }

  if (state !== STATE.PLAYING) return;
  timeAlive += dt * 1000;

  // Reload countdown
  if (reloadTimer > 0) {
    const before = reloadTimer;
    reloadTimer -= dt;
    if (reloadTimer <= 0) {
      reloadTimer = 0;
      reloadClick();
    }
    updateReloadUI();
  }

  // Spawn
  spawnTimer -= dt * 1000;
  if (spawnTimer <= 0) {
    spawnMascot();
    const difficulty = Math.min(1, timeAlive / 60000);
    spawnTimer = Math.max(450, 1400 - difficulty * 950) + Math.random() * 350;
  }

  // Update mascots
  for (const m of mascots) {
    if (m.hit) {
      m.hitTimer += dt;
      m.x += m.vx * 0.3 * dt;
      m.y += 300 * m.hitTimer * dt + 200 * dt;
      m.rot += m.rotDir * 6 * dt;
    } else {
      m.walkPhase += dt * 10;
      m.motionPhase += dt;
      m.blink -= dt;
      if (m.blink < -0.15) m.blink = 2 + Math.random() * 3;
      applyMotion(m);
      m.x += m.vx * dt;
      m.y = m.baseY + (m.bobY || 0);
    }
  }
  mascots = mascots.filter(m => {
    if (m.hit) return m.y < H + 200;
    return m.x > -120 && m.x < W + 120;
  });

  // Tracers
  for (const t of tracers) t.life -= dt;
  tracers = tracers.filter(t => t.life > 0);

  // Smoke
  for (const p of smokePuffs) {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.vx *= 0.92;
    p.vy = p.vy * 0.92 - 20 * dt;
    p.r += dt * 18;
    p.life -= dt;
  }
  smokePuffs = smokePuffs.filter(p => p.life > 0);

  // Particles
  for (const p of particles) {
    p.vy += 700 * dt;
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;
  }
  particles = particles.filter(p => p.life > 0);

  // Popups
  for (const p of popups) {
    p.y += p.vy * dt;
    p.vy += 60 * dt;
    p.life -= dt;
  }
  popups = popups.filter(p => p.life > 0);

  // End game when shots are used up and last reload finishes
  if (shotsLeft <= 0 && reloadTimer <= 0 && mascots.every(m => !m.hit || m.y > H)) {
    setTimeout(endGame, 400);
  }
}

function applyMotion(m) {
  switch (m.motion) {
    case 'plod':
      // Longhorn: slow heavy steps, slight up/down with hooves
      m.bobY = Math.sin(m.walkPhase * 0.8) * 1.5;
      m.vx = m.baseVx;
      break;
    case 'lumber':
      // Elephant: slow side-sway
      m.bobY = Math.sin(m.walkPhase * 0.9) * 2;
      m.vx = m.baseVx;
      break;
    case 'sprint':
      // Tiger/Cat: smooth fast bounding
      m.bobY = Math.abs(Math.sin(m.walkPhase * 1.4)) * -3.5;
      m.vx = m.baseVx;
      break;
    case 'stopgo': {
      // Bulldog: alternating pause and dash
      const t = m.motionPhase % 1.6;
      if (t < 0.4)      m.vx = 0;                // pause
      else if (t < 1.1) m.vx = m.baseVx * 1.4;    // dash
      else              m.vx = m.baseVx * 0.7;    // amble
      m.bobY = Math.sin(m.walkPhase) * 1.5;
      break;
    }
    case 'charge': {
      // Hog: occasional speed bursts straight ahead
      const t = m.motionPhase % 2.2;
      m.vx = m.baseVx * (t < 1.2 ? 1.0 : 1.7);
      m.bobY = Math.sin(m.walkPhase * 1.3) * 1.2;
      break;
    }
    case 'crawl':
      // Gator: low and steady, slithery sine
      m.bobY = Math.sin(m.walkPhase * 1.6) * 1.5;
      m.vx = m.baseVx;
      break;
    case 'flap': {
      // Gamecock: flying in sine wave + flap
      const ph = m.motionPhase * 2.5;
      m.bobY = Math.sin(ph) * 28;
      m.vx = m.baseVx * (1 + Math.sin(ph * 2) * 0.15);
      break;
    }
    case 'happy':
      // Smokey: cheerful trot with bob
      m.bobY = Math.sin(m.walkPhase * 1.1) * 2;
      m.vx = m.baseVx;
      break;
    default:
      m.bobY = Math.sin(m.walkPhase) * 1.5;
  }
}

// ============ DRAWING ============
function draw() {
  const sx = (Math.random() - 0.5) * shake;
  const sy = (Math.random() - 0.5) * shake;
  ctx.save();
  ctx.translate(sx, sy);

  drawSky();
  drawSmokies();
  drawSunsphere(W * 0.45, H * 0.66);
  drawForestHills();
  drawClouds();
  drawLandmarks();
  drawMeadow();
  drawTreesFar();
  drawBushes();
  drawRocks();
  drawButterflies();

  // Mascots — sky-track ones drawn first, ground after, so ground covers
  const skyM = mascots.filter(m => m.type && m.type.track === 'sky');
  const lowM = mascots.filter(m => !m.type || m.type.track !== 'sky');
  for (const m of skyM) drawMascot(m);
  // Sort ground by y for proper layering
  lowM.sort((a, b) => a.y - b.y);
  for (const m of lowM) drawMascot(m);

  drawTreesNear();
  drawHunter();
  drawMuzzleEffects();
  drawTracers();
  for (const p of particles) drawParticle(p);
  for (const p of popups) drawPopup(p);
  drawCrosshair();

  ctx.restore();
}

function drawSky() {
  const g = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  g.addColorStop(0, '#3a8de8');
  g.addColorStop(0.4, '#6ab8f5');
  g.addColorStop(0.85, '#bce6fb');
  g.addColorStop(1, '#e0f3fb');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H * 0.7);
  // Sun
  const sx = W * 0.78, sy = H * 0.14;
  const halo = ctx.createRadialGradient(sx, sy, 8, sx, sy, 160);
  halo.addColorStop(0, 'rgba(255,250,200,0.85)');
  halo.addColorStop(0.4, 'rgba(255,225,120,0.4)');
  halo.addColorStop(1, 'rgba(255,200,80,0)');
  ctx.fillStyle = halo;
  ctx.fillRect(sx - 180, sy - 180, 360, 360);
  ctx.fillStyle = '#FFF4B0';
  ctx.beginPath(); ctx.arc(sx, sy, 28, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath(); ctx.arc(sx - 5, sy - 5, 12, 0, Math.PI*2); ctx.fill();
}

function drawSmokies() {
  // 3 ridges getting closer, hazy
  const ridges = [
    { y: 0.36, hue: 'rgba(140,160,185,0.65)', amp: 30, freq: 1.1, phase: 0 },
    { y: 0.42, hue: 'rgba(110,135,165,0.75)', amp: 40, freq: 1.4, phase: 1.7 },
    { y: 0.48, hue: 'rgba(85,115,140,0.85)',  amp: 35, freq: 1.0, phase: 0.9 }
  ];
  for (const r of ridges) {
    ctx.fillStyle = r.hue;
    ctx.beginPath();
    ctx.moveTo(0, H * r.y);
    const steps = 14;
    for (let i = 0; i <= steps; i++) {
      const x = (i / steps) * W;
      const y = H * r.y - (r.amp + Math.sin(i * r.freq + r.phase) * r.amp * 0.7 + (i % 2 ? r.amp * 0.4 : 0));
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H * 0.55);
    ctx.lineTo(0, H * 0.55);
    ctx.fill();
  }
  // Smoky mist bands
  ctx.fillStyle = 'rgba(255,255,255,0.28)';
  ctx.fillRect(0, H * 0.35, W, H * 0.05);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.fillRect(0, H * 0.42, W, H * 0.04);
}

function drawForestHills() {
  // Rolling forested hill silhouette behind meadow
  ctx.fillStyle = '#3d6629';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.6);
  for (let i = 0; i <= 12; i++) {
    const x = (i / 12) * W;
    const y = H * 0.6 - (Math.sin(i * 0.9) * 12 + (i % 2 ? 14 : 4));
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H * 0.7);
  ctx.lineTo(0, H * 0.7);
  ctx.fill();
  // Closer hill, brighter green
  ctx.fillStyle = '#558a2f';
  ctx.beginPath();
  ctx.moveTo(0, H * 0.65);
  for (let i = 0; i <= 10; i++) {
    const x = (i / 10) * W;
    const y = H * 0.65 - (Math.cos(i * 0.7) * 8 + (i % 3 ? 8 : 0));
    ctx.lineTo(x, y);
  }
  ctx.lineTo(W, H * 0.72);
  ctx.lineTo(0, H * 0.72);
  ctx.fill();
}

function drawSunsphere(x, baseTopY) {
  // Distant Knoxville landmark — gold geodesic sphere on lattice steel tower
  const towerH = 90;
  const towerTopY = baseTopY - towerH;

  // Steel lattice tower (atmospheric haze tint)
  ctx.strokeStyle = 'rgba(90,95,115,0.85)';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(x - 11, baseTopY);
  ctx.lineTo(x - 3, towerTopY);
  ctx.lineTo(x + 3, towerTopY);
  ctx.lineTo(x + 11, baseTopY);
  ctx.stroke();
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(x, baseTopY);
  ctx.lineTo(x, towerTopY);
  ctx.stroke();
  ctx.lineWidth = 0.7;
  ctx.strokeStyle = 'rgba(105,110,130,0.75)';
  for (let i = 0; i < 7; i++) {
    const t = i / 7;
    const y1 = baseTopY - t * towerH;
    const y2 = baseTopY - (t + 1/7) * towerH;
    const wL = 11 - t * 8;
    const wR = 11 - (t + 1/7) * 8;
    ctx.beginPath();
    ctx.moveTo(x - wL, y1); ctx.lineTo(x + wR, y2);
    ctx.moveTo(x + wL, y1); ctx.lineTo(x - wR, y2);
    ctx.stroke();
  }

  // The golden sphere
  const sphereR = 14;
  const sphereY = towerTopY - sphereR + 2;

  // Soft sun-glow halo
  const halo = ctx.createRadialGradient(x, sphereY, 2, x, sphereY, sphereR * 2.5);
  halo.addColorStop(0, 'rgba(255,220,120,0.5)');
  halo.addColorStop(1, 'rgba(255,200,80,0)');
  ctx.fillStyle = halo;
  ctx.beginPath();
  ctx.arc(x, sphereY, sphereR * 2.5, 0, Math.PI * 2);
  ctx.fill();

  // Gold sphere body
  const sphereGrad = ctx.createRadialGradient(x - 3, sphereY - 3, 2, x, sphereY, sphereR);
  sphereGrad.addColorStop(0, '#FFE680');
  sphereGrad.addColorStop(0.5, '#FFC83D');
  sphereGrad.addColorStop(1, '#A8780B');
  ctx.fillStyle = sphereGrad;
  ctx.beginPath();
  ctx.arc(x, sphereY, sphereR, 0, Math.PI * 2);
  ctx.fill();

  // Facet pattern (concentric + radial lines)
  ctx.strokeStyle = 'rgba(120,80,20,0.45)';
  ctx.lineWidth = 0.6;
  for (let r = 1; r <= 3; r++) {
    ctx.beginPath();
    ctx.arc(x, sphereY, (sphereR * r) / 3, 0, Math.PI * 2);
    ctx.stroke();
  }
  for (let a = 0; a < 6; a++) {
    const ang = a * Math.PI / 3;
    ctx.beginPath();
    ctx.moveTo(x, sphereY);
    ctx.lineTo(x + Math.cos(ang) * sphereR, sphereY + Math.sin(ang) * sphereR);
    ctx.stroke();
  }

  // Catch-light reflection
  ctx.fillStyle = 'rgba(255,255,220,0.8)';
  ctx.beginPath();
  ctx.arc(x - 5, sphereY - 5, 3, 0, Math.PI * 2);
  ctx.fill();

  // Sphere outline
  ctx.strokeStyle = 'rgba(80,55,10,0.55)';
  ctx.lineWidth = 0.8;
  ctx.beginPath();
  ctx.arc(x, sphereY, sphereR, 0, Math.PI * 2);
  ctx.stroke();
}

function drawLandmarks() {
  // Two East Tennessee roadside landmarks tucked into the valley
  const groundY = H * 0.715;
  drawWeigels(W * 0.18, groundY);
  drawKrystal(W * 0.80, groundY);
}

function drawWeigels(cx, groundY) {
  // Small convenience-store + canopy building
  const bw = 56, bh = 22;
  const bx = cx - bw / 2, by = groundY - bh;
  // Canopy roof
  ctx.fillStyle = '#e8e8e8';
  ctx.fillRect(bx, by, bw, 7);
  ctx.fillStyle = '#C8102E'; // red trim
  ctx.fillRect(bx, by + 6, bw, 3);
  // Store body
  ctx.fillStyle = '#f4f4f4';
  ctx.fillRect(bx + 8, by + 9, bw - 16, bh - 9);
  ctx.fillStyle = '#cfcfcf';
  ctx.fillRect(bx + 8, by + bh - 4, bw - 16, 4);
  // Door
  ctx.fillStyle = '#6a6a6a';
  ctx.fillRect(cx - 4, by + 13, 8, bh - 13);
  // Window strips
  ctx.fillStyle = '#9ec9e8';
  ctx.fillRect(bx + 10, by + 11, 10, 4);
  ctx.fillRect(bx + bw - 20, by + 11, 10, 4);
  // Canopy support pillars
  ctx.fillStyle = '#888';
  ctx.fillRect(bx + 2, by + 9, 3, bh - 9);
  ctx.fillRect(bx + bw - 5, by + 9, 3, bh - 9);
  // Outline
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);

  // Tall pole sign (the iconic Weigel's sign on the highway)
  const poleX = cx + bw / 2 + 12;
  const poleTop = groundY - 76;
  ctx.fillStyle = '#888';
  ctx.fillRect(poleX - 1.5, poleTop + 12, 3, groundY - (poleTop + 12));
  // Round sign — red disc, white "W"
  ctx.fillStyle = '#C8102E';
  ctx.beginPath();
  ctx.arc(poleX, poleTop + 9, 12, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 2;
  ctx.stroke();
  // White "W"
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 14px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('W', poleX, poleTop + 10);
  // Wordmark plate below the disc
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(poleX - 16, poleTop + 22, 32, 12);
  ctx.strokeStyle = '#C8102E';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(poleX - 16, poleTop + 22, 32, 12);
  ctx.fillStyle = '#C8102E';
  ctx.font = "bold italic 8px Georgia, serif";
  ctx.textBaseline = 'middle';
  ctx.fillText("Weigel's", poleX, poleTop + 28);
  // Fuel-price LED plate
  ctx.fillStyle = '#0a0a0a';
  ctx.fillRect(poleX - 14, poleTop + 35, 28, 10);
  ctx.fillStyle = '#FFD66B';
  ctx.font = 'bold 6px Courier';
  ctx.fillText('2.92', poleX - 7, poleTop + 40);
  ctx.fillText('2.99', poleX + 7, poleTop + 40);
  ctx.textBaseline = 'alphabetic';
}

function drawKrystal(cx, groundY) {
  // Small square building with red trim — the Tennessee-original slider joint
  const bw = 60, bh = 36;
  const bx = cx - bw / 2, by = groundY - bh;
  // Building body (white)
  ctx.fillStyle = '#fafafa';
  ctx.fillRect(bx, by, bw, bh);
  // Ground shade
  ctx.fillStyle = '#dedede';
  ctx.fillRect(bx, by + bh - 4, bw, 4);
  // Red roof band
  ctx.fillStyle = '#D6202A';
  ctx.fillRect(bx, by, bw, 6);
  ctx.fillStyle = '#a8141d';
  ctx.fillRect(bx, by + 5, bw, 1);
  // Sign plate on roof
  ctx.fillStyle = '#D6202A';
  ctx.fillRect(bx + 10, by - 12, bw - 20, 12);
  ctx.strokeStyle = '#FFFFFF';
  ctx.lineWidth = 1.5;
  ctx.strokeRect(bx + 10, by - 12, bw - 20, 12);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = "bold italic 10px Georgia, serif";
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('Krystal', cx, by - 6);
  ctx.textBaseline = 'alphabetic';
  // Front window strip
  ctx.fillStyle = '#9ec9e8';
  ctx.fillRect(bx + 6, by + 12, bw - 12, 10);
  // Window mullions
  ctx.fillStyle = '#fafafa';
  for (let i = 1; i < 5; i++) {
    ctx.fillRect(bx + 6 + i * (bw - 12) / 5, by + 12, 1, 10);
  }
  // Door
  ctx.fillStyle = '#7a7a7a';
  ctx.fillRect(cx - 5, by + 24, 10, bh - 24);
  // Outline
  ctx.strokeStyle = 'rgba(0,0,0,0.55)';
  ctx.lineWidth = 1;
  ctx.strokeRect(bx, by, bw, bh);
  // Small "BURGERS" subscript below sign
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 5px Arial';
  ctx.textAlign = 'center';
  ctx.fillText('BURGERS', cx, by - 1);
}

function drawClouds() {
  ctx.fillStyle = 'rgba(255,255,255,0.92)';
  for (const c of clouds) {
    const x = c.x % (W + 200) - 100;
    const s = c.s;
    ctx.beginPath();
    ctx.ellipse(x, c.y, 32 * s, 14 * s, 0, 0, Math.PI*2);
    ctx.ellipse(x + 22 * s, c.y - 6 * s, 24 * s, 16 * s, 0, 0, Math.PI*2);
    ctx.ellipse(x - 20 * s, c.y - 4 * s, 20 * s, 13 * s, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawMeadow() {
  const g = ctx.createLinearGradient(0, H * 0.7, 0, H);
  g.addColorStop(0, '#7fbf4a');
  g.addColorStop(0.4, '#6ea53c');
  g.addColorStop(1, '#4a7a26');
  ctx.fillStyle = g;
  ctx.fillRect(0, H * 0.7, W, H * 0.3);
  // Grass blade tufts
  ctx.strokeStyle = 'rgba(180,220,120,0.6)';
  ctx.lineWidth = 1;
  for (let i = 0; i < 120; i++) {
    const gx = (i * 41) % W;
    const gy = H * 0.7 + ((i * 17) % (H * 0.3));
    ctx.beginPath();
    ctx.moveTo(gx, gy);
    ctx.lineTo(gx + 1, gy - 5);
    ctx.stroke();
  }
  // Wildflowers (orange & white)
  for (let i = 0; i < 35; i++) {
    const fx = (i * 73 + 30) % W;
    const fy = H * 0.78 + ((i * 53) % (H * 0.18));
    ctx.fillStyle = i % 3 === 0 ? '#FF8200' : (i % 3 === 1 ? '#FFD700' : '#FFFFFF');
    ctx.beginPath();
    ctx.arc(fx, fy, 1.8, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(fx - 2, fy + 0.5, 1.2, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.arc(fx + 2, fy + 0.5, 1.2, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawTree(tx, ty, h, type, near) {
  if (type === 'pine') {
    // Trunk
    const trunkW = Math.max(3, h * 0.08);
    ctx.fillStyle = near ? '#3a2010' : '#4a3020';
    ctx.fillRect(tx - trunkW/2, ty - h * 0.3, trunkW, h * 0.3);
    // Triangular foliage stacked
    ctx.fillStyle = near ? '#1f4a18' : '#2a5a22';
    const layers = 3;
    for (let i = 0; i < layers; i++) {
      const ly = ty - h * 0.3 - i * h * 0.22;
      const lw = h * 0.45 * (1 - i * 0.15);
      ctx.beginPath();
      ctx.moveTo(tx - lw/2, ly);
      ctx.lineTo(tx + lw/2, ly);
      ctx.lineTo(tx, ly - h * 0.3);
      ctx.closePath();
      ctx.fill();
    }
    // Highlight
    ctx.fillStyle = near ? '#3a6a28' : '#4a7a36';
    for (let i = 0; i < layers; i++) {
      const ly = ty - h * 0.3 - i * h * 0.22;
      ctx.fillRect(tx - 2, ly - h * 0.28, 2, h * 0.18);
    }
  } else {
    // Deciduous (oak-ish)
    const trunkW = Math.max(3, h * 0.1);
    ctx.fillStyle = near ? '#4a2c14' : '#5a3a20';
    ctx.fillRect(tx - trunkW/2, ty - h * 0.45, trunkW, h * 0.45);
    // Canopy (multi-blob)
    ctx.fillStyle = near ? '#3d7a26' : '#4d8a36';
    const cy = ty - h * 0.55;
    const cr = h * 0.32;
    ctx.beginPath();
    ctx.arc(tx, cy, cr, 0, Math.PI*2);
    ctx.arc(tx - cr * 0.6, cy + cr * 0.2, cr * 0.7, 0, Math.PI*2);
    ctx.arc(tx + cr * 0.6, cy + cr * 0.2, cr * 0.7, 0, Math.PI*2);
    ctx.arc(tx, cy - cr * 0.4, cr * 0.7, 0, Math.PI*2);
    ctx.fill();
    // Highlight
    ctx.fillStyle = near ? '#5d9a40' : '#6daa50';
    ctx.beginPath();
    ctx.arc(tx - cr * 0.4, cy - cr * 0.3, cr * 0.35, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawTreesFar() {
  for (const t of treesFar) {
    drawTree(t.x, H * 0.7, t.h, t.type, false);
  }
}
function drawTreesNear() {
  for (const t of treesNear) {
    drawTree(t.x, H * 0.92, t.h, t.type, true);
  }
}

function drawBushes() {
  for (const b of bushes) {
    const s = b.s;
    ctx.fillStyle = '#3d7a26';
    ctx.beginPath();
    ctx.arc(b.x, b.y, 18 * s, 0, Math.PI*2);
    ctx.arc(b.x - 12 * s, b.y + 3, 12 * s, 0, Math.PI*2);
    ctx.arc(b.x + 12 * s, b.y + 3, 12 * s, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#5d9a40';
    ctx.beginPath();
    ctx.arc(b.x - 4 * s, b.y - 5 * s, 7 * s, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawRocks() {
  for (const r of rocks) {
    const s = r.s;
    ctx.fillStyle = '#7a7268';
    ctx.beginPath();
    ctx.ellipse(r.x, r.y, 16 * s, 9 * s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#5a5248';
    ctx.beginPath();
    ctx.ellipse(r.x, r.y + 4 * s, 16 * s, 5 * s, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.fillStyle = '#a09888';
    ctx.beginPath();
    ctx.ellipse(r.x - 4 * s, r.y - 3 * s, 6 * s, 3 * s, 0, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawButterflies() {
  for (const b of butterflies) {
    // Math.abs keeps wing radius non-negative (ctx.ellipse throws on negative radii)
    const flap = Math.abs(Math.sin(b.phase * 6)) * 0.7 + 0.2;
    ctx.save();
    ctx.translate(b.x, b.y);
    // Wings (orange)
    ctx.fillStyle = '#FF8200';
    ctx.beginPath();
    ctx.ellipse(-4, 0, 4 * flap, 5, 0.3, 0, Math.PI*2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(4, 0, 4 * flap, 5, -0.3, 0, Math.PI*2);
    ctx.fill();
    // Body
    ctx.fillStyle = '#3a2010';
    ctx.fillRect(-1, -3, 2, 6);
    ctx.restore();
  }
}

// ============ HUNTER (Davy Crockett with rifle) ============
const PC = {
  hatDark:'#2a1408', hatMid:'#4a2810', hatLight:'#6b3a18', stripe:'#1a0a04',
  skin:'#f4c896', skinShade:'#c69569', skinHi:'#ffe0b8',
  hair:'#3a2010', beard:'#4a2818',
  jersey:'#FF8200', jerseyHi:'#ffb04a', jerseyShade:'#b85a00',
  buckskin:'#c9a576', buckskinShade:'#a08456',
  white:'#ffffff',
  pants:'#5b3216', pantsHi:'#7a4520', pantsShade:'#3a200d',
  boot:'#1a0a04', bootHi:'#3a1a0a',
  belt:'#2a1408', buckle:'#FFD700',
  outline:'#000000',
  rifleStock:'#5a3416', rifleStockHi:'#7a4a26', rifleStockShade:'#3a2010',
  rifleMetal:'#2a2a2a', rifleMetalHi:'#5a5a5a', rifleMetalShade:'#0a0a0a',
  brass:'#C9A300'
};

function drawHunter() {
  const x = hunterX();
  const y = hunterY();
  const t = performance.now() / 1000;

  // Aim direction
  let aimDx = 0, aimDy = -1;
  if (crosshair.visible) {
    aimDx = crosshair.x - muzzleAnchorX();
    aimDy = crosshair.y - muzzleAnchorY();
  } else {
    aimDx = 1; aimDy = -0.3;
  }
  const aimAngle = Math.atan2(aimDy, aimDx);
  const facing = aimDx < 0 ? -1 : 1;
  const breathing = Math.sin(t * 1.8) * 1;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.45)';
  ctx.beginPath();
  ctx.ellipse(x, y + 22 * HUNTER_SCALE, 44 * HUNTER_SCALE, 8 * HUNTER_SCALE, 0, 0, Math.PI*2);
  ctx.fill();

  ctx.save();
  ctx.translate(x, y + breathing);
  ctx.scale(facing * HUNTER_SCALE, HUNTER_SCALE);

  // helpers
  function pix(c, x, y, w, h) { ctx.fillStyle = c; ctx.fillRect(x, y, w, h); }
  function outline(x, y, w, h) {
    ctx.fillStyle = PC.outline;
    ctx.fillRect(x - 1, y, 1, h);
    ctx.fillRect(x + w, y, 1, h);
    ctx.fillRect(x, y - 1, w, 1);
    ctx.fillRect(x, y + h, w, 1);
  }

  // === Legs (planted stance) ===
  // Back leg
  pix(PC.pants, -16, -14, 13, 32);
  pix(PC.pantsShade, -16, -14, 4, 32);
  pix(PC.pantsHi, -5, -14, 2, 32);
  outline(-16, -14, 13, 32);
  pix(PC.boot, -18, 16, 17, 9);
  pix(PC.bootHi, -18, 16, 17, 2);
  outline(-18, 16, 17, 9);
  // Front leg (forward)
  pix(PC.pants, 4, -14, 13, 32);
  pix(PC.pantsShade, 4, -14, 3, 32);
  pix(PC.pantsHi, 13, -14, 2, 32);
  outline(4, -14, 13, 32);
  pix(PC.boot, 2, 16, 17, 9);
  pix(PC.bootHi, 2, 16, 17, 2);
  outline(2, 16, 17, 9);
  // Pants fringe (buckskin)
  for (let i = 0; i < 4; i++) {
    pix(PC.buckskin, -17, -8 + i * 7, 2, 5);
    pix(PC.buckskin, 16, -8 + i * 7, 2, 5);
  }

  // Belt
  pix(PC.belt, -16, -17, 33, 5);
  outline(-16, -17, 33, 5);
  pix(PC.buckle, -3, -17, 8, 5);
  outline(-3, -17, 8, 5);
  pix(PC.outline, -1, -16, 4, 3);
  // Powder horn on belt (Crockett-style accessory)
  ctx.save();
  ctx.translate(-12, -16);
  ctx.rotate(-0.3);
  ctx.fillStyle = '#d6c89a';
  ctx.beginPath();
  ctx.moveTo(0, 0); ctx.lineTo(10, 1); ctx.lineTo(11, 4); ctx.lineTo(-1, 3); ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#000'; ctx.lineWidth = 1; ctx.stroke();
  ctx.fillStyle = '#3a2010';
  ctx.fillRect(10, 0, 2, 4);
  ctx.restore();

  // === Torso: buckskin jacket with orange UT trim ===
  pix(PC.buckskin, -19, -48, 38, 31);
  pix(PC.buckskinShade, 14, -48, 5, 31);
  pix(PC.jerseyHi, -19, -48, 4, 31);
  outline(-19, -48, 38, 31);
  // Orange UT chest panel
  pix(PC.jersey, -10, -45, 20, 22);
  outline(-10, -45, 20, 22);
  pix(PC.jerseyShade, 5, -45, 5, 22);
  pix(PC.jerseyHi, -10, -45, 3, 22);
  // "T" emblem
  ctx.fillStyle = PC.white;
  ctx.font = 'bold 16px Impact, sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('T', 0, -27);
  ctx.strokeStyle = PC.outline;
  ctx.lineWidth = 1.5;
  ctx.strokeText('T', 0, -27);
  // Buckskin fringes along bottom and shoulders
  for (let i = 0; i < 7; i++) {
    pix(PC.buckskinShade, -17 + i * 6, -18, 2, 7);
  }
  // Shoulder fringe (left & right shoulders)
  for (let i = 0; i < 4; i++) {
    pix(PC.buckskinShade, -19, -48 + i * 4, 2, 3);
    pix(PC.buckskinShade, 18, -48 + i * 4, 2, 3);
  }
  // Shoulder pad bumps
  pix(PC.buckskin, -19, -50, 11, 4);
  pix(PC.buckskin, 8, -50, 11, 4);

  // === Front (support) arm — under barrel of rifle ===
  // This arm rotates with the rifle to support the barrel
  ctx.save();
  ctx.translate(8, -46);
  // Aim adjusted for facing
  const supportArmAngle = facing === 1 ? aimAngle : Math.PI - aimAngle;
  ctx.rotate(supportArmAngle * 0.55);
  pix(PC.buckskin, 0, -5, 18, 10);
  pix(PC.buckskinShade, 0, 0, 18, 5);
  outline(0, -5, 18, 10);
  // Hand on barrel
  pix(PC.skin, 16, -6, 9, 12);
  pix(PC.skinShade, 20, -6, 5, 12);
  outline(16, -6, 9, 12);
  ctx.restore();

  // === Neck ===
  pix(PC.skin, -6, -54, 12, 8);
  pix(PC.skinShade, 2, -54, 4, 8);
  outline(-6, -54, 12, 8);

  // === Head ===
  ctx.save();
  ctx.translate(0, -64);
  const headTilt = crosshair.visible ? Math.max(-0.25, Math.min(0.25, aimAngle * 0.15)) : 0;
  ctx.rotate(headTilt * facing);
  pix(PC.skin, -11, -10, 22, 20);
  pix(PC.skinShade, 7, -10, 4, 20);
  pix(PC.skinHi, -11, -10, 3, 20);
  outline(-11, -10, 22, 20);
  // Sideburns
  pix(PC.hair, -11, -2, 3, 8);
  pix(PC.hair, 8, -2, 3, 8);
  // Beard
  pix(PC.beard, -8, 3, 16, 5);
  // Squinted eye (sighting down the barrel)
  if (crosshair.visible) {
    // Squint
    pix(PC.outline, 2, -3, 7, 2);
  } else {
    pix(PC.white, 2, -4, 6, 4);
    outline(2, -4, 6, 4);
    pix(PC.outline, 5, -3, 3, 3);
    pix(PC.white, 6, -3, 1, 1);
  }
  // Brow (focused)
  pix(PC.hair, 1, -7, 9, 2);
  // Mouth (determined line)
  pix(PC.outline, 1, 5, 7, 2);
  // Nose
  pix(PC.skinShade, 8, 0, 2, 3);
  ctx.restore();

  // === Coonskin hat ===
  pix(PC.hatDark, -15, -75, 30, 4);
  outline(-15, -75, 30, 4);
  pix(PC.hatMid, -13, -85, 26, 11);
  pix(PC.hatDark, -13, -85, 26, 3);
  pix(PC.hatLight, -13, -82, 4, 8);
  outline(-13, -85, 26, 11);
  // Fur tufts
  pix(PC.hatDark, -10, -82, 3, 2);
  pix(PC.hatDark, -4, -80, 3, 2);
  pix(PC.hatDark, 2, -83, 3, 2);
  pix(PC.hatDark, 8, -81, 3, 2);
  pix(PC.hatLight, -7, -78, 2, 1);
  pix(PC.hatLight, 4, -79, 2, 1);

  // === Raccoon tail ===
  ctx.save();
  ctx.translate(-13, -75);
  ctx.rotate(-0.6);
  pix(PC.hatMid, -5, 0, 11, 32);
  outline(-5, 0, 11, 32);
  pix(PC.stripe, -5, 4, 11, 4);
  pix(PC.stripe, -5, 13, 11, 4);
  pix(PC.stripe, -5, 22, 11, 4);
  pix(PC.stripe, -4, 30, 9, 6);
  outline(-4, 30, 9, 6);
  pix(PC.hatLight, -5, 0, 2, 32);
  ctx.restore();

  ctx.restore(); // end facing scale

  // === Rifle (drawn separately in world coords, anchored at shoulder) ===
  drawRifle(muzzleAnchorX(), muzzleAnchorY() + breathing, aimAngle);

  // === Trigger arm (back arm holding the stock & trigger) ===
  // Drawn after rifle so it appears in front near the stock
  ctx.save();
  ctx.translate(x, y + breathing);
  ctx.scale(facing * HUNTER_SCALE, HUNTER_SCALE);
  // Pivot at right shoulder, hand goes toward stock (back end of rifle)
  ctx.translate(-4, -46);
  // Back arm angle: roughly aim direction but pulled in
  const trigArmAngle = facing === 1 ? aimAngle : Math.PI - aimAngle;
  ctx.rotate(trigArmAngle * 0.4 + Math.PI * 0.05);
  pix(PC.buckskin, 0, -5, 14, 10);
  pix(PC.buckskinShade, 0, 0, 14, 5);
  outline(0, -5, 14, 10);
  // Hand (gripping)
  pix(PC.skin, 12, -5, 8, 10);
  pix(PC.skinShade, 16, -5, 4, 10);
  outline(12, -5, 8, 10);
  ctx.restore();
}

function drawRifle(shoulderX, shoulderY, aimAngle) {
  ctx.save();
  ctx.translate(shoulderX, shoulderY);
  ctx.rotate(aimAngle);
  ctx.scale(HUNTER_SCALE, HUNTER_SCALE);
  // Recoil offset
  ctx.translate(-recoil * 12, 0);

  // === Stock (curved butt at back, behind shoulder) ===
  // Curved butt plate
  ctx.fillStyle = PC.rifleStock;
  ctx.beginPath();
  ctx.moveTo(-38, -7);
  ctx.lineTo(-22, -6);
  ctx.lineTo(-20, 8);
  ctx.lineTo(-36, 9);
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = PC.outline; ctx.lineWidth = 1.5; ctx.stroke();
  // Butt plate metal cap
  ctx.fillStyle = PC.brass;
  ctx.beginPath();
  ctx.moveTo(-38, -7);
  ctx.lineTo(-39, -2);
  ctx.lineTo(-39, 4);
  ctx.lineTo(-36, 9);
  ctx.lineTo(-37, 0);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Stock body (wood)
  ctx.fillStyle = PC.rifleStock;
  ctx.beginPath();
  ctx.moveTo(-22, -6);
  ctx.lineTo(8, -5);
  ctx.lineTo(8, 5);
  ctx.lineTo(-20, 8);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();
  // Stock highlight
  ctx.fillStyle = PC.rifleStockHi;
  ctx.fillRect(-20, -5, 26, 2);
  // Stock shade
  ctx.fillStyle = PC.rifleStockShade;
  ctx.fillRect(-20, 5, 26, 2);
  // Cheek piece dot
  ctx.fillStyle = PC.brass;
  ctx.beginPath();
  ctx.arc(-12, -2, 1.5, 0, Math.PI*2);
  ctx.fill();

  // === Lock plate (metal sidelock) ===
  ctx.fillStyle = PC.rifleMetalHi;
  ctx.fillRect(4, -5, 10, 9);
  ctx.fillStyle = PC.rifleMetal;
  ctx.fillRect(4, -5, 10, 2);
  ctx.fillStyle = PC.rifleMetalShade;
  ctx.fillRect(4, 2, 10, 2);
  ctx.strokeStyle = PC.outline; ctx.strokeRect(4, -5, 10, 9);
  // Hammer
  ctx.fillStyle = PC.rifleMetal;
  ctx.beginPath();
  ctx.moveTo(9, -5);
  ctx.lineTo(11, -10);
  ctx.lineTo(13, -10);
  ctx.lineTo(12, -5);
  ctx.closePath();
  ctx.fill();
  ctx.stroke();

  // === Trigger guard ===
  ctx.strokeStyle = PC.brass;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(2, 5);
  ctx.quadraticCurveTo(8, 12, 14, 5);
  ctx.stroke();
  // Trigger
  ctx.strokeStyle = PC.rifleMetal;
  ctx.lineWidth = 1.4;
  ctx.beginPath();
  ctx.moveTo(8, 5);
  ctx.lineTo(8, 9);
  ctx.stroke();

  // === Barrel (long, octagonal) ===
  const barrelLen = 90 - 8;  // from x=8 to x=98
  const barrelStartX = 8;
  ctx.fillStyle = PC.rifleMetal;
  ctx.fillRect(barrelStartX, -3, barrelLen, 6);
  // Top highlight stripe (octagonal facet)
  ctx.fillStyle = PC.rifleMetalHi;
  ctx.fillRect(barrelStartX, -3, barrelLen, 1.5);
  ctx.fillStyle = PC.rifleMetalShade;
  ctx.fillRect(barrelStartX, 1.5, barrelLen, 1.5);
  // Barrel outline
  ctx.strokeStyle = PC.outline;
  ctx.lineWidth = 1;
  ctx.strokeRect(barrelStartX, -3, barrelLen, 6);

  // Brass bands at intervals
  ctx.fillStyle = PC.brass;
  for (const bandX of [20, 40, 65]) {
    ctx.fillRect(bandX, -4, 2, 8);
  }

  // === Sights ===
  // Rear sight (notch) above lock
  ctx.fillStyle = PC.rifleMetal;
  ctx.fillRect(16, -5, 3, 2);
  ctx.fillStyle = PC.outline;
  ctx.fillRect(17, -5, 1, 2);
  // Front sight (bead) near muzzle
  ctx.fillStyle = PC.rifleMetal;
  ctx.beginPath();
  ctx.moveTo(85, -3);
  ctx.lineTo(86, -7);
  ctx.lineTo(87, -3);
  ctx.fill();

  // === Muzzle (flared) ===
  ctx.fillStyle = PC.rifleMetalShade;
  ctx.fillRect(94, -4, 4, 8);
  ctx.strokeRect(94, -4, 4, 8);
  // Bore (dark circle inside muzzle)
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(96, 0, 1.5, 0, Math.PI*2);
  ctx.fill();

  // Wooden forend running under barrel
  ctx.fillStyle = PC.rifleStock;
  ctx.fillRect(8, 3, 75, 4);
  ctx.fillStyle = PC.rifleStockHi;
  ctx.fillRect(8, 3, 75, 1);
  ctx.fillStyle = PC.rifleStockShade;
  ctx.fillRect(8, 6, 75, 1);
  ctx.strokeStyle = PC.outline;
  ctx.strokeRect(8, 3, 75, 4);

  ctx.restore();
}

function drawMuzzleEffects() {
  if (muzzleFlash <= 0) return;
  const mx = muzzleAnchorX();
  const my = muzzleAnchorY();
  let ang = 0;
  if (crosshair.visible) {
    ang = Math.atan2(crosshair.y - my, crosshair.x - mx);
  }
  const len = (90 - recoil * 12) * HUNTER_SCALE;
  const fx = mx + Math.cos(ang) * len;
  const fy = my + Math.sin(ang) * len;
  // Flash
  const a = muzzleFlash / 0.12;
  ctx.save();
  ctx.translate(fx, fy);
  ctx.rotate(ang);
  ctx.scale(HUNTER_SCALE, HUNTER_SCALE);
  ctx.globalAlpha = a;
  // Outer glow
  const grad = ctx.createRadialGradient(0, 0, 2, 0, 0, 30);
  grad.addColorStop(0, 'rgba(255,255,200,1)');
  grad.addColorStop(0.4, 'rgba(255,180,40,0.7)');
  grad.addColorStop(1, 'rgba(255,100,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(-30, -30, 60, 60);
  // Sharp star burst
  ctx.fillStyle = '#FFFAA0';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(22, -8);
  ctx.lineTo(28, 0);
  ctx.lineTo(22, 8);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(14, -3);
  ctx.lineTo(16, 0);
  ctx.lineTo(14, 3);
  ctx.closePath();
  ctx.fill();
  ctx.globalAlpha = 1;
  ctx.restore();

  // Smoke
  for (const p of smokePuffs) {
    const a2 = Math.max(0, p.life / p.maxLife) * 0.6;
    ctx.fillStyle = `rgba(220,220,220,${a2})`;
    ctx.beginPath();
    ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawTracers() {
  for (const t of tracers) {
    const a = t.life / t.maxLife;
    ctx.strokeStyle = `rgba(255,250,180,${a * 0.9})`;
    ctx.lineWidth = 2.5;
    ctx.beginPath();
    ctx.moveTo(t.x1, t.y1);
    ctx.lineTo(t.x2, t.y2);
    ctx.stroke();
    // Bright core
    ctx.strokeStyle = `rgba(255,255,255,${a})`;
    ctx.lineWidth = 1;
    ctx.stroke();
    // Impact sparkle
    ctx.fillStyle = `rgba(255,240,180,${a})`;
    ctx.beginPath();
    ctx.arc(t.x2, t.y2, 4 * a + 1, 0, Math.PI*2);
    ctx.fill();
  }
}

function drawCrosshair() {
  if (!crosshair.visible || state !== STATE.PLAYING) return;
  const x = crosshair.x, y = crosshair.y;
  const ready = reloadTimer <= 0 && shotsLeft > 0;
  const color = ready ? '#FF8200' : '#888';
  ctx.strokeStyle = color;
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.arc(x, y, 14, 0, Math.PI*2);
  ctx.moveTo(x - 22, y); ctx.lineTo(x - 9, y);
  ctx.moveTo(x + 9, y);  ctx.lineTo(x + 22, y);
  ctx.moveTo(x, y - 22); ctx.lineTo(x, y - 9);
  ctx.moveTo(x, y + 9);  ctx.lineTo(x, y + 22);
  ctx.stroke();
  // Center dot
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.arc(x, y, 2, 0, Math.PI*2);
  ctx.fill();
  // White inner ring
  if (ready) {
    ctx.strokeStyle = 'rgba(255,255,255,0.7)';
    ctx.lineWidth = 1;
    ctx.beginPath();
    ctx.arc(x, y, 10, 0, Math.PI*2);
    ctx.stroke();
  }
}

function drawParticle(p) {
  const a = Math.max(0, p.life / p.maxLife);
  ctx.fillStyle = p.color;
  ctx.globalAlpha = a;
  ctx.fillRect(p.x - p.size/2, p.y - p.size/2, p.size, p.size);
  ctx.globalAlpha = 1;
}
function drawPopup(p) {
  const a = Math.min(1, p.life);
  ctx.globalAlpha = a;
  ctx.font = `bold ${p.size}px Impact, sans-serif`;
  ctx.textAlign = 'center';
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 4;
  ctx.strokeText(p.text, p.x, p.y);
  ctx.fillStyle = p.color;
  ctx.fillText(p.text, p.x, p.y);
  ctx.globalAlpha = 1;
}

// ============ MASCOTS ============
function drawMascot(m) {
  ctx.save();
  ctx.translate(m.x, m.y);
  if (m.hit) ctx.rotate(m.rot);
  ctx.scale(m.size * m.dir, m.size);

  if (m.smokey) drawSmokey(m);
  else drawEnemy(m);
  ctx.restore();

  // Label
  if (!m.hit) {
    ctx.save();
    ctx.translate(m.x, m.y - 60 * m.size);
    ctx.font = `bold ${Math.round(11 * m.size)}px Impact, sans-serif`;
    ctx.textAlign = 'center';
    if (m.smokey) {
      ctx.font = `bold ${Math.round(14 * m.size)}px Impact, sans-serif`;
      const pulse = 1 + Math.sin(performance.now() / 150) * 0.1;
      ctx.scale(pulse, pulse);
      ctx.strokeStyle = '#FFFFFF';
      ctx.lineWidth = 4;
      ctx.strokeText('★ SMOKEY ★', 0, 0);
      ctx.fillStyle = '#FF8200';
      ctx.fillText('★ SMOKEY ★', 0, 0);
    } else {
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 3;
      ctx.strokeText(m.type.label, 0, 0);
      ctx.fillStyle = m.type.accent;
      ctx.fillText(m.type.label, 0, 0);
    }
    ctx.restore();
  }
}

function legs(m, color) {
  const swing = Math.sin(m.walkPhase) * 5;
  ctx.fillStyle = color;
  ctx.fillRect(-14, -2, 5, 16 + swing);
  ctx.fillRect(-4, -2, 5, 16 - swing);
  ctx.fillRect(6, -2, 5, 16 + swing);
  ctx.fillRect(14, -2, 5, 16 - swing);
}

function drawEnemy(m) {
  const t = m.type;
  if (t.id === 'cock') { drawCock(m); return; }
  if (t.id === 'gator') { drawGator(m); return; }

  legs(m, t.body);
  // Body
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(0, -8, 22, 13, 0, 0, Math.PI*2);
  ctx.fill();
  // Accent
  ctx.fillStyle = t.accent;
  ctx.fillRect(-18, -10, 36, 6);

  switch (t.id) {
    case 'dawg':  drawDawgHead(t); break;
    case 'tide':  drawElephantHead(t); break;
    case 'tiger': drawTigerHead(t); break;
    case 'hog':   drawHogHead(t); break;
    case 'horn':  drawHornHead(t); break;
    case 'cat':   drawCatHead(t); break;
  }
  // Angry brow
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 2.5;
  ctx.beginPath();
  ctx.moveTo(20, -28); ctx.lineTo(28, -25);
  ctx.moveTo(34, -28); ctx.lineTo(42, -25);
  ctx.stroke();
}

function drawDawgHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath(); ctx.ellipse(22, -22, 14, 13, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#6b3a18';
  ctx.beginPath(); ctx.ellipse(32, -18, 9, 7, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(38, -19, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#5a3414';
  ctx.beginPath(); ctx.ellipse(15, -28, 5, 10, -0.3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(24, -24, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(25, -24, 1.8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = t.accent;
  ctx.fillRect(14, -12, 16, 4);
  ctx.fillStyle = '#FFF';
  ctx.font = 'bold 7px Arial';
  ctx.fillText('G', 19, -9);
}
function drawElephantHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath(); ctx.ellipse(22, -22, 15, 14, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(12, -22, 9, 12, -0.2, 0, Math.PI*2); ctx.fill();
  ctx.beginPath();
  ctx.moveTo(32, -22);
  ctx.quadraticCurveTo(44, -16, 38, -6);
  ctx.quadraticCurveTo(34, -2, 30, -4);
  ctx.quadraticCurveTo(28, -10, 28, -18);
  ctx.fill();
  ctx.fillStyle = '#FFF8DC';
  ctx.beginPath();
  ctx.moveTo(28, -14); ctx.lineTo(34, -6); ctx.lineTo(30, -10);
  ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(22, -24, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -24, 1.8, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = t.accent;
  ctx.fillRect(-18, -10, 36, 5);
}
function drawTigerHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath(); ctx.ellipse(22, -22, 13, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  for (let i = 0; i < 4; i++) {
    ctx.fillRect(15 + i * 4, -32, 2, 6);
    ctx.fillRect(-15 + i * 8, -16, 2, 10);
  }
  ctx.fillStyle = t.body;
  ctx.beginPath(); ctx.moveTo(14, -30); ctx.lineTo(18, -36); ctx.lineTo(20, -28); ctx.fill();
  ctx.beginPath(); ctx.moveTo(28, -30); ctx.lineTo(31, -36); ctx.lineTo(33, -28); ctx.fill();
  ctx.fillStyle = '#FDD023';
  ctx.beginPath(); ctx.arc(19, -23, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(28, -23, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.fillRect(18.5, -24, 1, 3);
  ctx.fillRect(27.5, -24, 1, 3);
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(23, -17, 4, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -18, 1.5, 0, Math.PI*2); ctx.fill();
}
function drawHogHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath(); ctx.ellipse(24, -20, 14, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#a85555';
  ctx.beginPath(); ctx.ellipse(34, -18, 7, 6, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(34, -19, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(36, -17, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(22, -22, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -22, 1.8, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#5a2a2a';
  ctx.lineWidth = 2;
  for (let i = 0; i < 5; i++) {
    ctx.beginPath(); ctx.moveTo(-10 + i * 7, -20); ctx.lineTo(-12 + i * 7, -28); ctx.stroke();
  }
  ctx.fillStyle = '#FFF8DC';
  ctx.beginPath(); ctx.moveTo(28, -15); ctx.lineTo(32, -10); ctx.lineTo(30, -16); ctx.fill();
}
function drawHornHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath(); ctx.ellipse(22, -22, 14, 13, 0, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#FFF8DC';
  ctx.lineWidth = 4; ctx.lineCap = 'round';
  ctx.beginPath();
  ctx.moveTo(22, -32);
  ctx.quadraticCurveTo(0, -36, -10, -28);
  ctx.moveTo(22, -32);
  ctx.quadraticCurveTo(44, -36, 50, -28);
  ctx.stroke();
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.ellipse(30, -16, 7, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(33, -17, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(33, -14, 1.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(22, -23, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(23, -23, 1.8, 0, Math.PI*2); ctx.fill();
}
function drawCatHead(t) {
  ctx.fillStyle = t.body;
  ctx.beginPath(); ctx.ellipse(22, -22, 13, 12, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.moveTo(13, -28); ctx.lineTo(16, -38); ctx.lineTo(20, -28); ctx.fill();
  ctx.beginPath(); ctx.moveTo(26, -28); ctx.lineTo(30, -38); ctx.lineTo(33, -28); ctx.fill();
  ctx.fillStyle = '#FFEC00';
  ctx.beginPath(); ctx.arc(19, -22, 3, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.arc(27, -22, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.fillRect(18.5, -24, 1, 4);
  ctx.fillRect(26.5, -24, 1, 4);
  ctx.fillStyle = '#FFB6C1';
  ctx.beginPath();
  ctx.moveTo(23, -16); ctx.lineTo(25, -16); ctx.lineTo(24, -14);
  ctx.fill();
  ctx.strokeStyle = '#FFF';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(20, -14); ctx.lineTo(10, -15);
  ctx.moveTo(20, -13); ctx.lineTo(11, -12);
  ctx.moveTo(28, -14); ctx.lineTo(38, -15);
  ctx.moveTo(28, -13); ctx.lineTo(37, -12);
  ctx.stroke();
}

// === Gamecock (flying bird pose) ===
function drawCock(m) {
  const t = m.type;
  const wing = Math.sin(m.motionPhase * 10) * 0.8;
  // Body
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(0, -8, 18, 11, 0, 0, Math.PI*2);
  ctx.fill();
  // Tail feathers
  ctx.fillStyle = '#FFD700';
  for (let i = 0; i < 4; i++) {
    ctx.beginPath();
    ctx.ellipse(-14 - i * 2, -10 - i * 3, 4, 9, 0.6 + i * 0.15, 0, Math.PI*2);
    ctx.fill();
  }
  // Wings (flapping)
  ctx.fillStyle = t.body;
  ctx.save();
  ctx.translate(0, -10);
  ctx.rotate(wing);
  ctx.beginPath();
  ctx.ellipse(0, -2, 14, 8, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = t.accent;
  ctx.beginPath();
  ctx.ellipse(2, 0, 10, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // Head
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(15, -14, 9, 9, 0, 0, Math.PI*2);
  ctx.fill();
  // Comb
  ctx.fillStyle = '#FF0000';
  ctx.beginPath();
  ctx.moveTo(10, -22); ctx.lineTo(13, -27); ctx.lineTo(16, -22); ctx.lineTo(19, -27); ctx.lineTo(20, -20);
  ctx.fill();
  // Beak
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  ctx.moveTo(22, -14); ctx.lineTo(30, -12); ctx.lineTo(22, -10);
  ctx.fill();
  // Wattle
  ctx.fillStyle = '#FF0000';
  ctx.beginPath();
  ctx.ellipse(20, -7, 3, 4, 0, 0, Math.PI*2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(17, -16, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(18, -16, 1.5, 0, Math.PI*2); ctx.fill();
  // Legs tucked back while flying
  ctx.strokeStyle = '#FFD700';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(-2, 0); ctx.lineTo(-8, 6);
  ctx.moveTo(2, 0); ctx.lineTo(-4, 6);
  ctx.stroke();
}

// === Gator (low crawling pose) ===
function drawGator(m) {
  const t = m.type;
  // Tail
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.moveTo(-30, -4);
  ctx.lineTo(-12, -10);
  ctx.lineTo(-12, -2);
  ctx.lineTo(-30, 0);
  ctx.closePath();
  ctx.fill();
  // Body
  ctx.beginPath();
  ctx.ellipse(0, -6, 24, 8, 0, 0, Math.PI*2);
  ctx.fill();
  // Back ridge
  ctx.fillStyle = '#1a3008';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(-15 + i * 6, -12);
    ctx.lineTo(-12 + i * 6, -16);
    ctx.lineTo(-9 + i * 6, -12);
    ctx.fill();
  }
  // Legs (short, splayed)
  const swing = Math.sin(m.walkPhase) * 3;
  ctx.fillStyle = t.body;
  ctx.fillRect(-15, -2, 5, 6 + swing);
  ctx.fillRect(-3, -2, 5, 6 - swing);
  ctx.fillRect(8, -2, 5, 6 + swing);
  // Head/snout
  ctx.fillStyle = t.body;
  ctx.beginPath();
  ctx.ellipse(22, -8, 16, 6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.beginPath();
  ctx.ellipse(14, -12, 12, 7, 0, 0, Math.PI*2);
  ctx.fill();
  // Teeth
  ctx.fillStyle = '#FFF';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    ctx.moveTo(16 + i * 4, -4);
    ctx.lineTo(18 + i * 4, -1);
    ctx.lineTo(20 + i * 4, -4);
    ctx.fill();
  }
  // Eyes
  ctx.fillStyle = '#FFF';
  ctx.beginPath(); ctx.arc(16, -16, 3, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(17, -16, 1.5, 0, Math.PI*2); ctx.fill();
  // Accent jersey strip
  ctx.fillStyle = t.accent;
  ctx.fillRect(-8, -10, 18, 3);
}

function drawSmokey(m) {
  // Aura
  const glow = 1 + Math.sin(performance.now() / 200) * 0.2;
  ctx.fillStyle = `rgba(255,130,0,${0.16 * glow})`;
  ctx.beginPath();
  ctx.arc(10, -15, 42, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = `rgba(255,255,255,${0.18 * glow})`;
  ctx.beginPath();
  ctx.arc(10, -15, 32, 0, Math.PI*2);
  ctx.fill();
  // Legs
  const swing = Math.sin(m.walkPhase) * 5;
  ctx.fillStyle = '#FFFFFF';
  ctx.fillRect(-14, -2, 5, 16 + swing);
  ctx.fillRect(-4, -2, 5, 16 - swing);
  ctx.fillRect(6, -2, 5, 16 + swing);
  ctx.fillRect(14, -2, 5, 16 - swing);
  // Body
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(0, -8, 22, 13, 0, 0, Math.PI*2);
  ctx.fill();
  // Orange spots
  ctx.fillStyle = '#FF8200';
  ctx.beginPath(); ctx.ellipse(-8, -10, 7, 5, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(6, -6, 6, 4, 0, 0, Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(12, -12, 5, 3, 0, 0, Math.PI*2); ctx.fill();
  // "T"
  ctx.fillStyle = '#FF8200';
  ctx.font = 'bold 12px Impact';
  ctx.textAlign = 'center';
  ctx.fillText('T', 0, -5);
  // Head
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(22, -20, 13, 11, 0, 0, Math.PI*2);
  ctx.fill();
  // Floppy orange ears
  ctx.fillStyle = '#FF8200';
  ctx.save();
  ctx.translate(16, -22);
  ctx.rotate(-0.3);
  ctx.beginPath();
  ctx.ellipse(0, 6, 6, 13, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  ctx.save();
  ctx.translate(28, -22);
  ctx.rotate(0.3);
  ctx.beginPath();
  ctx.ellipse(0, 6, 6, 13, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // Snout
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(32, -16, 8, 6, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#000';
  ctx.beginPath(); ctx.arc(38, -18, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.strokeStyle = '#000';
  ctx.lineWidth = 1.5;
  ctx.beginPath();
  ctx.arc(33, -14, 4, 0.2, Math.PI - 0.2);
  ctx.stroke();
  ctx.fillStyle = '#FF69B4';
  ctx.beginPath();
  ctx.ellipse(34, -10, 4, 2.5, 0, 0, Math.PI*2);
  ctx.fill();
  // Eye
  ctx.fillStyle = '#000';
  if (m.blink > 0.1) {
    ctx.beginPath(); ctx.arc(24, -22, 2.5, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#FFF';
    ctx.beginPath(); ctx.arc(25, -23, 0.8, 0, Math.PI*2); ctx.fill();
  } else {
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(21, -22); ctx.lineTo(27, -22);
    ctx.stroke();
  }
  // Wagging tail
  const wag = Math.sin(m.walkPhase * 3) * 0.5;
  ctx.save();
  ctx.translate(-22, -14);
  ctx.rotate(-0.4 + wag);
  ctx.fillStyle = '#FF8200';
  ctx.fillRect(0, -3, 14, 6);
  ctx.beginPath();
  ctx.ellipse(14, 0, 3, 4, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.fillStyle = '#FFFFFF';
  ctx.beginPath();
  ctx.ellipse(14, 0, 2, 2.5, 0, 0, Math.PI*2);
  ctx.fill();
  ctx.restore();
  // Collar
  ctx.fillStyle = '#FF8200';
  ctx.fillRect(14, -12, 16, 4);
  ctx.fillStyle = '#FFFFFF';
  ctx.font = 'bold 7px Arial';
  ctx.fillText('T', 22, -9);
}

// ============ UI ============
function updateShotsUI() {
  const el = document.getElementById('shotCount');
  el.textContent = shotsLeft;
  el.classList.remove('low', 'critical');
  if (shotsLeft <= 3) el.classList.add('critical');
  else if (shotsLeft <= 7) el.classList.add('low');
}
function updateReloadUI() {
  const bar = document.getElementById('reloadBar');
  const fill = document.getElementById('reloadFill');
  const label = document.getElementById('reloadLabel');
  if (reloadTimer > 0 && state === STATE.PLAYING) {
    bar.classList.add('active');
    label.classList.add('active');
    const pct = (1 - reloadTimer / RELOAD_TIME) * 100;
    fill.style.width = pct + '%';
  } else {
    bar.classList.remove('active');
    label.classList.remove('active');
  }
  document.getElementById('score').textContent = score.toLocaleString();
}

// ============ INPUT ============
function getEventPos(e) {
  const rect = canvas.getBoundingClientRect();
  if (e.touches && e.touches.length) {
    return { x: e.touches[0].clientX - rect.left, y: e.touches[0].clientY - rect.top };
  }
  return { x: e.clientX - rect.left, y: e.clientY - rect.top };
}
function handleMove(e) {
  const p = getEventPos(e);
  crosshair.x = p.x; crosshair.y = p.y; crosshair.visible = true;
}
function handleClick(e) {
  if (state !== STATE.PLAYING) return;
  e.preventDefault();
  ensureAudio();
  const p = getEventPos(e);
  crosshair.x = p.x; crosshair.y = p.y; crosshair.visible = true;
  fire(p.x, p.y);
}
function handleTouchStart(e) {
  if (state !== STATE.PLAYING) return;
  e.preventDefault();
  ensureAudio();
  const p = getEventPos(e);
  crosshair.x = p.x; crosshair.y = p.y; crosshair.visible = true;
  fire(p.x, p.y);
}
function handleTouchMove(e) {
  e.preventDefault();
  const p = getEventPos(e);
  crosshair.x = p.x; crosshair.y = p.y; crosshair.visible = true;
}

canvas.addEventListener('mousemove', handleMove);
canvas.addEventListener('mouseleave', () => { crosshair.visible = false; });
canvas.addEventListener('mousedown', handleClick);
canvas.addEventListener('contextmenu', e => e.preventDefault());

canvas.addEventListener('touchstart', handleTouchStart, { passive: false });
canvas.addEventListener('touchmove', handleTouchMove, { passive: false });
canvas.addEventListener('touchend', e => e.preventDefault(), { passive: false });

// Keyboard: spacebar to fire at last cursor pos
window.addEventListener('keydown', e => {
  if (e.code === 'Space' && state === STATE.PLAYING && crosshair.visible) {
    e.preventDefault();
    fire(crosshair.x, crosshair.y);
  }
});

// ============ GAME FLOW ============
function startGame() {
  ensureAudio();
  state = STATE.PLAYING;
  score = 0;
  shotsLeft = MAX_SHOTS;
  reloadTimer = 0;
  recoil = 0;
  muzzleFlash = 0;
  mascots = [];
  tracers = [];
  particles = [];
  popups = [];
  smokePuffs = [];
  timeAlive = 0;
  spawnTimer = 200;
  shake = 0;
  stats = { hits: 0, misses: 0, smokey: 0 };
  document.getElementById('title').classList.add('hidden');
  document.getElementById('gameover').classList.add('hidden');
  document.getElementById('score').textContent = '0';
  updateShotsUI();
  updateReloadUI();
  beep(440, 0.1, 'square', 0.1);
  setTimeout(() => beep(660, 0.1, 'square', 0.1), 80);
  setTimeout(() => beep(880, 0.15, 'square', 0.1), 160);
}

function endGame() {
  if (state !== STATE.PLAYING) return;
  state = STATE.OVER;
  let savedScore = undefined;
  if (qualifiesForLeaderboard(score)) {
    let initials = '';
    try {
      const input = window.prompt('NEW HIGH SCORE! Enter your initials (up to 8 chars):', 'VOL');
      if (input !== null) initials = input.trim().toUpperCase().substring(0, 8);
    } catch (e) {}
    if (!initials) initials = 'VOL';
    saveHighScore(initials, score);
    savedScore = score;
  }
  renderHighScores(document.getElementById('gameoverHighscores'), savedScore);
  document.getElementById('finalScore').textContent = score.toLocaleString();
  const total = stats.hits + stats.misses + stats.smokey;
  const accuracy = total > 0 ? Math.round((stats.hits / total) * 100) : 0;
  document.getElementById('finalStats').textContent =
    `${stats.hits} HITS · ${stats.misses} MISSES · ${stats.smokey} SMOKEYS · ${accuracy}% ACCURACY`;
  document.getElementById('gameover').classList.remove('hidden');
  // Sad horn
  beep(220, 0.3, 'sawtooth', 0.12);
  setTimeout(() => beep(180, 0.4, 'sawtooth', 0.12), 200);
  setTimeout(() => beep(120, 0.6, 'sawtooth', 0.12), 450);
}

document.getElementById('startBtn').addEventListener('click', startGame);
document.getElementById('restartBtn').addEventListener('click', startGame);

// ============ MAIN LOOP ============
function loop(now) {
  const dt = Math.min(0.05, (now - lastTime) / 1000);
  lastTime = now;
  update(dt);
  draw();
  requestAnimationFrame(loop);
}
updateShotsUI();
renderHighScores(document.getElementById('titleHighscores'));
requestAnimationFrame((t) => { lastTime = t; loop(t); });

})();
</script>
